<!-- Download Progress Modal -->
<div
    x-show="downloadProgressModalOpen"
    class="fixed inset-0 z-50 overflow-y-auto"
    x-cloak
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
>
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div
            class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
            x-show="downloadProgressModalOpen"
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
        ></div>

        <!-- Modal panel -->
        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full"
            x-show="downloadProgressModalOpen"
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:translate-y-0 sm:scale-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        >
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <!-- Header -->
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-download text-white text-lg"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-medium text-gray-900">Model Downloads</h3>
                            <p class="text-sm text-gray-500" x-text="downloadStats.activeDownloads + ' active downloads'"></p>
                        </div>
                    </div>
                    <button
                        @click="closeDownloadProgressModal()"
                        :disabled="!canCloseDownloadModal"
                        class="text-gray-400 hover:text-gray-600 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <!-- Overall Progress -->
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-gray-700">Overall Progress</span>
                        <span class="text-sm text-gray-500" x-text="Math.round(overallProgress) + '%'"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div
                            class="bg-blue-600 h-2 rounded-full transition-all duration-300"
                            :style="{ width: overallProgress + '%' }"
                        ></div>
                    </div>
                </div>

                <!-- Download List -->
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    <template x-for="download in downloads" :key="download.model_name">
                        <div class="border border-gray-200 rounded-lg p-4">
                            <!-- Model Info -->
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center space-x-3">
                                    <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-cube text-gray-600 text-sm"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-medium text-gray-900" x-text="download.model_name"></h4>
                                        <p class="text-sm text-gray-500" x-text="download.status"></p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <span
                                        class="px-2 py-1 text-xs rounded-full"
                                        :class="{
                                            'bg-green-100 text-green-800': download.status === 'completed',
                                            'bg-blue-100 text-blue-800': download.status === 'downloading',
                                            'bg-red-100 text-red-800': download.status === 'failed',
                                            'bg-gray-100 text-gray-800': download.status === 'pending'
                                        }"
                                        x-text="download.status"
                                    ></span>
                                    <button
                                        x-show="download.status === 'downloading'"
                                        @click="cancelDownload(download.model_name)"
                                        class="text-red-600 hover:text-red-800 text-sm"
                                    >
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Progress Bar -->
                            <div class="mb-2">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-sm text-gray-600">Progress</span>
                                    <span class="text-sm text-gray-600" x-text="Math.round(download.progress) + '%'"></span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div
                                        class="h-2 rounded-full transition-all duration-300"
                                        :class="{
                                            'bg-green-500': download.status === 'completed',
                                            'bg-blue-500': download.status === 'downloading',
                                            'bg-red-500': download.status === 'failed',
                                            'bg-gray-400': download.status === 'pending'
                                        }"
                                        :style="{ width: download.progress + '%' }"
                                    ></div>
                                </div>
                            </div>

                            <!-- Download Details -->
                            <div class="grid grid-cols-2 gap-4 text-sm text-gray-600">
                                <div>
                                    <span class="font-medium">Downloaded:</span>
                                    <span x-text="formatBytes(download.downloaded_bytes)"></span>
                                </div>
                                <div>
                                    <span class="font-medium">Total:</span>
                                    <span x-text="formatBytes(download.total_bytes)"></span>
                                </div>
                                <div x-show="download.speed > 0">
                                    <span class="font-medium">Speed:</span>
                                    <span x-text="formatBytes(download.speed) + '/s'"></span>
                                </div>
                                <div x-show="download.eta > 0">
                                    <span class="font-medium">ETA:</span>
                                    <span x-text="formatTime(download.eta)"></span>
                                </div>
                            </div>

                            <!-- Error Message -->
                            <div x-show="download.error_message" class="mt-2 p-2 bg-red-50 border border-red-200 rounded text-sm text-red-700">
                                <i class="fas fa-exclamation-triangle mr-2"></i>
                                <span x-text="download.error_message"></span>
                            </div>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <div x-show="downloads.length === 0" class="text-center py-8 text-gray-500">
                        <i class="fas fa-download text-3xl mb-2"></i>
                        <p>No downloads in progress</p>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button
                    @click="closeDownloadProgressModal()"
                    :disabled="!canCloseDownloadModal"
                    class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span x-text="canCloseDownloadModal ? 'Close' : 'Downloads in Progress...'"></span>
                </button>
                <button
                    x-show="downloads.length > 0"
                    @click="clearCompletedDownloads()"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm"
                >
                    Clear Completed
                </button>
            </div>
        </div>
    </div>
</div>
