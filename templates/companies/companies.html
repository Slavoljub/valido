<!-- Companies Main Tab Content -->
<div class="space-y-6">
    <!-- Search and Filters -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="form-label">Search</label>
                <input type="text" id="searchInput" placeholder="Search companies..." class="form-input"
                       onkeyup="filterCompanies()">
            </div>
            <div>
                <label class="form-label">Status</label>
                <select id="statusFilter" class="form-input" onchange="filterCompanies()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="demo">Demo</option>
                </select>
            </div>
            <div>
                <label class="form-label">Business Form</label>
                <select id="businessFormFilter" class="form-input" onchange="filterCompanies()">
                    <option value="">All Forms</option>
                    <!-- Will be populated by JavaScript -->
                </select>
            </div>
            <div>
                <label class="form-label">Business Area</label>
                <select id="businessAreaFilter" class="form-input" onchange="filterCompanies()">
                    <option value="">All Areas</option>
                    <!-- Will be populated by JavaScript -->
                </select>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Stats will be loaded here -->
    </div>

    <!-- Companies Grid -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200">
        <div class="p-6 border-b border-gray-200">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <h3 class="text-lg font-medium text-gray-900">Companies</h3>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="refreshCompanies()" class="btn-secondary">
                        <i class="fas fa-sync-alt mr-2"></i>
                        Refresh
                    </button>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="companiesGrid">
                <!-- Companies will be loaded here -->
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-spinner fa-spin text-3xl text-gray-400 mb-4"></i>
                    <p class="text-gray-500">Loading companies...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div id="paginationContainer" class="flex items-center justify-between bg-white px-4 py-3 border-t border-gray-200 sm:px-6 rounded-lg shadow-sm">
        <!-- Pagination will be loaded here -->
    </div>
</div>

<!-- Tab-specific JavaScript -->
<script>
function filterCompanies() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const businessFormFilter = document.getElementById('businessFormFilter').value;
    const businessAreaFilter = document.getElementById('businessAreaFilter').value;

    // Filter companies based on criteria
    const companies = document.querySelectorAll('#companiesGrid .company-card');
    companies.forEach(company => {
        const companyName = company.querySelector('.company-name')?.textContent.toLowerCase() || '';
        const companyStatus = company.dataset.status || '';
        const companyForm = company.dataset.businessForm || '';
        const companyArea = company.dataset.businessArea || '';

        const matchesSearch = companyName.includes(searchTerm);
        const matchesStatus = !statusFilter || companyStatus === statusFilter;
        const matchesForm = !businessFormFilter || companyForm === businessFormFilter;
        const matchesArea = !businessAreaFilter || companyArea === businessAreaFilter;

        if (matchesSearch && matchesStatus && matchesForm && matchesArea) {
            company.style.display = '';
        } else {
            company.style.display = 'none';
        }
    });
}

function refreshCompanies() {
    // Refresh companies data
    loadCompanies();
}

// Load companies data
async function loadCompanies() {
    try {
        const response = await fetch('/api/companies');
        const data = await response.json();

        if (data.success) {
            renderCompanies(data.companies);
            renderStats(data.stats);
            loadFilters();
        } else {
            showToast('Error', 'Failed to load companies', 'error');
        }
    } catch (error) {
        console.error('Error loading companies:', error);
        showToast('Error', 'Failed to load companies', 'error');
    }
}

// Render companies grid
function renderCompanies(companies) {
    const grid = document.getElementById('companiesGrid');
    if (!companies || companies.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-12">
                <i class="fas fa-building text-3xl text-gray-400 mb-4"></i>
                <p class="text-gray-500 mb-4">No companies found</p>
                <button onclick="openCreateModal()" class="btn-primary">
                    <i class="fas fa-plus mr-2"></i>
                    Add First Company
                </button>
            </div>
        `;
        return;
    }

    grid.innerHTML = companies.map(company => `
        <div class="company-card" data-status="${company.is_active ? 'active' : 'inactive'}"
             data-business-form="${company.business_forms_id}" data-business-area="${company.business_areas_id}">
            <div class="flex items-start justify-between">
                <div class="flex-1">
                    <h3 class="company-name text-lg font-medium text-gray-900 mb-2">${company.company_name}</h3>
                    <p class="text-sm text-gray-600 mb-2">${company.legal_name || 'No legal name'}</p>
                    <div class="flex items-center text-sm text-gray-500 mb-2">
                        <i class="fas fa-id-card mr-1"></i>
                        PIB: ${company.tax_id}
                    </div>
                    <div class="flex items-center text-sm text-gray-500 mb-2">
                        <i class="fas fa-map-marker-alt mr-1"></i>
                        ${company.cities_name || 'No city'}, ${company.countries_name || 'No country'}
                    </div>
                    <div class="flex items-center text-sm text-gray-500">
                        <i class="fas fa-envelope mr-1"></i>
                        ${company.email || 'No email'}
                    </div>
                </div>
                <div class="flex flex-col items-end space-y-2">
                    <span class="company-status status-${company.is_active ? 'active' : 'inactive'}">
                        ${company.is_active ? 'Active' : 'Inactive'}
                    </span>
                    <div class="flex space-x-2">
                        <button onclick="viewCompany('${company.companies_id}')"
                                class="text-blue-600 hover:text-blue-800" title="View">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="editCompany('${company.companies_id}')"
                                class="text-green-600 hover:text-green-800" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteCompany('${company.companies_id}')"
                                class="text-red-600 hover:text-red-800" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

// Render statistics
function renderStats(stats) {
    const container = document.getElementById('statsContainer');
    if (!stats) return;

    container.innerHTML = `
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-blue-500 rounded-md flex items-center justify-center">
                        <i class="fas fa-building text-white text-sm"></i>
                    </div>
                </div>
                <div class="ml-4">
                    <div class="text-2xl font-bold text-gray-900">${stats.total || 0}</div>
                    <div class="text-sm text-gray-500">Total Companies</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-green-500 rounded-md flex items-center justify-center">
                        <i class="fas fa-check-circle text-white text-sm"></i>
                    </div>
                </div>
                <div class="ml-4">
                    <div class="text-2xl font-bold text-gray-900">${stats.active || 0}</div>
                    <div class="text-sm text-gray-500">Active Companies</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-yellow-500 rounded-md flex items-center justify-center">
                        <i class="fas fa-clock text-white text-sm"></i>
                    </div>
                </div>
                <div class="ml-4">
                    <div class="text-2xl font-bold text-gray-900">${stats.demo || 0}</div>
                    <div class="text-sm text-gray-500">Demo Companies</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-red-500 rounded-md flex items-center justify-center">
                        <i class="fas fa-times-circle text-white text-sm"></i>
                    </div>
                </div>
                <div class="ml-4">
                    <div class="text-2xl font-bold text-gray-900">${stats.inactive || 0}</div>
                    <div class="text-sm text-gray-500">Inactive Companies</div>
                </div>
            </div>
        </div>
    `;
}

// Load filter options
async function loadFilters() {
    try {
        // Load business forms
        const formsResponse = await fetch('/api/business-forms');
        const formsData = await formsResponse.json();
        if (formsData.success) {
            const formSelect = document.getElementById('businessFormFilter');
            formSelect.innerHTML = '<option value="">All Forms</option>' +
                formsData.forms.map(form => `<option value="${form.business_forms_id}">${form.form_name}</option>`).join('');
        }

        // Load business areas
        const areasResponse = await fetch('/api/business-areas');
        const areasData = await areasResponse.json();
        if (areasData.success) {
            const areaSelect = document.getElementById('businessAreaFilter');
            areaSelect.innerHTML = '<option value="">All Areas</option>' +
                areasData.areas.map(area => `<option value="${area.business_areas_id}">${area.area_name}</option>`).join('');
        }
    } catch (error) {
        console.error('Error loading filters:', error);
    }
}

// Initialize when tab is activated
document.addEventListener('companiesTabActivated', function() {
    loadCompanies();
});
</script>
