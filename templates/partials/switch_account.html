<!-- Switch Account Partial -->
<div class="relative" x-data="{ accountOpen: false }">
    <button 
        @click="accountOpen = !accountOpen" 
        class="flex items-center space-x-2 p-2 rounded-md hover:bg-neutral-100 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors"
        aria-label="Switch account"
    >
        <i class="fas fa-exchange-alt text-lg"></i>
        <span class="hidden sm:block text-sm font-medium">Switch</span>
        <i class="fas fa-chevron-down text-xs"></i>
    </button>
    
    <!-- Account Dropdown -->
    <div 
        x-show="accountOpen" 
        @click.away="accountOpen = false"
        x-transition:enter="transition ease-out duration-100"
        x-transition:enter-start="transform opacity-0 scale-95"
        x-transition:enter-end="transform opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="transform opacity-100 scale-100"
        x-transition:leave-end="transform opacity-0 scale-95"
        class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl border border-neutral-200 py-2 z-50"
    >
        <!-- Header -->
        <div class="px-4 py-2 border-b border-neutral-200">
            <h3 class="text-sm font-semibold text-neutral-900">Switch Account</h3>
            <p class="text-xs text-neutral-500 mt-1">Choose your active account</p>
        </div>
        
        <!-- Account List -->
        <div class="max-h-64 overflow-y-auto">
            <!-- Company Account -->
            <div class="px-4 py-3 hover:bg-neutral-50 cursor-pointer border-b border-neutral-100">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-building text-blue-600"></i>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-neutral-900">ValidoAI Company</div>
                            <div class="text-xs text-neutral-500">Business Account</div>
                            <div class="text-xs text-neutral-400">Created August, 2014</div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                        <span class="text-xs text-blue-600 font-medium">Active</span>
                    </div>
                </div>
            </div>
            
            <!-- Personal Account -->
            <div class="px-4 py-3 hover:bg-neutral-50 cursor-pointer border-b border-neutral-100">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-user text-green-600"></i>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-neutral-900">John Doe</div>
                            <div class="text-xs text-neutral-500">Personal Account</div>
                            <div class="text-xs text-neutral-400">Created September, 2018</div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-neutral-300 rounded-full"></div>
                        <span class="text-xs text-neutral-500">Inactive</span>
                    </div>
                </div>
            </div>
            
            <!-- Freelancer Account -->
            <div class="px-4 py-3 hover:bg-neutral-50 cursor-pointer">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-code text-purple-600"></i>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-neutral-900">Freelance Projects</div>
                            <div class="text-xs text-neutral-500">Project Account</div>
                            <div class="text-xs text-neutral-400">Created January, 2023</div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-neutral-300 rounded-full"></div>
                        <span class="text-xs text-neutral-500">Inactive</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="px-4 py-2 border-t border-neutral-200 bg-neutral-50">
            <div class="flex items-center justify-between">
                <button class="text-xs text-primary-600 hover:text-primary-700 font-medium">
                    <i class="fas fa-plus mr-1"></i>Add Account
                </button>
                <button class="text-xs text-neutral-500 hover:text-neutral-700">
                    Manage Accounts
                </button>
            </div>
        </div>
    </div>
</div>
