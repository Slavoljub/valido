<!-- Breadcrumbs Partial -->
<nav class="sticky-breadcrumbs px-4 sm:px-6 lg:px-8" aria-label="Breadcrumb">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between h-12">
            <!-- Breadcrumb Navigation -->
            <ol class="flex items-center space-x-2 text-sm">
                <li>
                    <a href="/" class="text-neutral-500 hover:text-neutral-700 flex items-center">
                        <i class="fas fa-home mr-1"></i>
                        <span class="hidden sm:inline">Home</span>
                    </a>
                </li>
                {% if breadcrumbs %}
                    {% for breadcrumb in breadcrumbs %}
                        <li class="flex items-center">
                            <i class="fas fa-chevron-right text-neutral-400 mx-2"></i>
                            {% if loop.last %}
                                <span class="text-neutral-900 font-medium">{{ breadcrumb.title }}</span>
                            {% else %}
                                <a href="{{ breadcrumb.url }}" class="text-neutral-500 hover:text-neutral-700">
                                    {{ breadcrumb.title }}
                                </a>
                            {% endif %}
                        </li>
                    {% endfor %}
                {% endif %}
            </ol>

                         <!-- Context Selector -->
             <div class="flex items-center space-x-2 sm:space-x-4">
                 <!-- Account Switcher -->
                 <div class="relative" x-data="{ accountOpen: false }">
                    <button 
                        @click="accountOpen = !accountOpen" 
                        class="flex items-center space-x-2 text-sm text-neutral-600 hover:text-neutral-900 focus:outline-none focus:ring-2 focus:ring-primary-500 rounded-md px-2 py-1"
                    >
                        <i class="fas fa-user-circle"></i>
                        <span class="hidden sm:inline">Personal</span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    
                    <!-- Account Dropdown -->
                    <div 
                        x-show="accountOpen" 
                        @click.away="accountOpen = false"
                        x-transition:enter="transition ease-out duration-100"
                        x-transition:enter-start="transform opacity-0 scale-95"
                        x-transition:enter-end="transform opacity-100 scale-100"
                        x-transition:leave="transition ease-in duration-75"
                        x-transition:leave-start="transform opacity-100 scale-100"
                        x-transition:leave-end="transform opacity-0 scale-95"
                        class="absolute right-0 mt-2 w-64 bg-white rounded-lg shadow-lg border border-neutral-200 py-1 z-50"
                    >
                        <div class="px-3 py-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Switch Account</div>
                        
                        <!-- Company Account -->
                        <div class="px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-building text-blue-600"></i>
                                    </div>
                                    <div>
                                        <div class="text-sm font-medium text-neutral-900">Company</div>
                                        <div class="text-xs text-neutral-500">Created August, 2014</div>
                                    </div>
                                </div>
                                <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                            </div>
                        </div>
                        
                        <!-- Personal Account -->
                        <div class="px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-user text-green-600"></i>
                                    </div>
                                    <div>
                                        <div class="text-sm font-medium text-neutral-900">Personal</div>
                                        <div class="text-xs text-neutral-500">Created September, 2018</div>
                                    </div>
                                </div>
                                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>

                                 <!-- Action Buttons -->
                 <div class="flex items-center space-x-1 sm:space-x-2">
                                                               <button 
                          @click="window.ModalSystem.showQuickActions()" 
                          class="inline-flex items-center px-2 sm:px-3 py-1.5 border border-neutral-300 shadow-sm text-xs font-medium rounded-md text-neutral-700 bg-white hover:bg-neutral-50 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors"
                      >
                          <i class="fas fa-bolt mr-1"></i>
                          <span class="hidden sm:inline">Quick Actions</span>
                      </button>
                      
                      <button 
                          @click="window.ModalSystem.showDashboardExamples()" 
                          class="inline-flex items-center px-2 sm:px-3 py-1.5 border border-neutral-300 shadow-sm text-xs font-medium rounded-md text-neutral-700 bg-white hover:bg-neutral-50 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors"
                      >
                          <i class="fas fa-chart-line mr-1"></i>
                          <span class="hidden sm:inline">Dashboard Examples</span>
                      </button>
                      
                      <button 
                          @click="window.ModalSystem.showConfirmation('Delete Transaction', 'Are you sure you want to delete this transaction? This action cannot be undone.', function(data) { showToast('success', 'Transaction deleted successfully'); })" 
                          class="inline-flex items-center px-2 sm:px-3 py-1.5 border border-neutral-300 shadow-sm text-xs font-medium rounded-md text-neutral-700 bg-white hover:bg-neutral-50 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors"
                      >
                          <i class="fas fa-trash mr-1"></i>
                          <span class="hidden sm:inline">Delete Example</span>
                      </button>
                </div>
            </div>
        </div>
    </div>
</nav>
