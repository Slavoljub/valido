{% extends "layouts/base.html" %}

{% block title %}AI Chat - ValidoAI{% endblock %}

{% block content %}
<div class="w-full h-screen flex flex-col" x-data="chatApp()">
    <!-- Chat Header -->
    <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-semibold text-gray-900 dark:text-white">AI Chat</h1>
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-500 dark:text-gray-400">Model:</span>
                    <select x-model="selectedModel" @change="loadModel()" 
                            class="px-3 py-1 border border-gray-300 rounded-md text-sm bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="">Select Model</option>
                        <template x-for="model in availableModels" :key="model.name">
                            <option :value="model.name" x-text="model.name"></option>
                        </template>
                    </select>
                    <span class="px-2 py-1 text-xs rounded-full" 
                          :class="{
                            'bg-green-100 text-green-800': modelStatus === 'loaded',
                            'bg-yellow-100 text-yellow-800': modelStatus === 'loading',
                            'bg-red-100 text-red-800': modelStatus === 'error',
                            'bg-gray-100 text-gray-800': modelStatus === 'idle'
                          }" x-text="modelStatusText"></span>
                </div>
            </div>
            <button @click="newConversation()" 
                    class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 transition-colors duration-200">
                New Conversation
            </button>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Conversations Sidebar -->
        <div class="w-80 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-3">Conversations</h3>
                <div class="space-y-2 max-h-60 overflow-y-auto">
                    <template x-for="conversation in conversations" :key="conversation.id">
                        <div class="flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer"
                             @click="loadConversation(conversation.id)">
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-medium text-gray-900 dark:text-white truncate" 
                                     x-text="conversation.title || 'New Conversation'"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400" 
                                     x-text="conversation.updated_at"></div>
                            </div>
                            <button @click.stop="deleteConversation(conversation.id)" 
                                    class="text-gray-400 hover:text-red-500 transition-colors duration-200">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Quick Start Prompts -->
            <div class="p-4 flex-1">
                <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-3">Quick Start</h3>
                <div class="space-y-2">
                    <button @click="sendQuickMessage('Hello! How can you help me today?')" 
                            class="w-full text-left p-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors duration-200">
                        Hello! How can you help me today?
                    </button>
                    <button @click="sendQuickMessage('Explain machine learning in simple terms')" 
                            class="w-full text-left p-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors duration-200">
                        Explain machine learning in simple terms
                    </button>
                    <button @click="sendQuickMessage('Write a Python function to calculate fibonacci numbers')" 
                            class="w-full text-left p-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors duration-200">
                        Write a Python function to calculate fibonacci numbers
                    </button>
                    <button @click="sendQuickMessage('What are the best practices for web development?')" 
                            class="w-full text-left p-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors duration-200">
                        What are the best practices for web development?
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col">
            <!-- Messages Area -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="messages-container">
                <template x-for="message in messages" :key="message.id">
                    <div class="flex" :class="message.role === 'user' ? 'justify-end' : 'justify-start'">
                        <div class="max-w-3xl" :class="message.role === 'user' ? 'order-2' : 'order-1'">
                            <div class="flex items-start space-x-3" :class="message.role === 'user' ? 'flex-row-reverse space-x-reverse' : ''">
                                <!-- Avatar -->
                                <div class="flex-shrink-0">
                                    <div class="w-8 h-8 rounded-full flex items-center justify-center"
                                         :class="message.role === 'user' ? 'bg-primary-600' : 'bg-gray-600'">
                                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                                            <path x-show="message.role === 'user'" fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                            <path x-show="message.role === 'assistant'" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    </div>
                                </div>
                                
                                <!-- Message Content -->
                                <div class="flex-1">
                                    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm border border-gray-200 dark:border-gray-700"
                                         :class="message.role === 'user' ? 'bg-primary-50 dark:bg-primary-900/20 border-primary-200 dark:border-primary-700' : ''">
                                        <div class="text-sm text-gray-900 dark:text-white whitespace-pre-wrap" x-text="message.content"></div>
                                        <div class="mt-2 text-xs text-gray-500 dark:text-gray-400" x-text="formatTimestamp(message.timestamp)"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Loading Indicator -->
                <div x-show="isLoading" class="flex justify-start">
                    <div class="max-w-3xl">
                        <div class="flex items-start space-x-3">
                            <div class="flex-shrink-0">
                                <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center">
                                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                </div>
                            </div>
                            <div class="flex-1">
                                <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                                    <div class="flex items-center space-x-2">
                                        <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-primary-600"></div>
                                        <span class="text-sm text-gray-600 dark:text-gray-400">AI is thinking...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="border-t border-gray-200 dark:border-gray-700 p-4 bg-white dark:bg-gray-800">
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <textarea x-model="newMessage" 
                                  @keydown.enter.prevent="sendMessage()"
                                  placeholder="Type your message here... (Press Enter to send)"
                                  class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg resize-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
                                  rows="3"></textarea>
                    </div>
                    <div class="flex flex-col space-y-2">
                        <button @click="sendMessage()" 
                                :disabled="!newMessage.trim() || isLoading"
                                class="bg-primary-600 text-white px-6 py-3 rounded-lg hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-200">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path>
                            </svg>
                        </button>
                        <button @click="newMessage = ''" 
                                class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 px-6 py-3 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors duration-200">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function chatApp() {
    return {
        // Data
        availableModels: [],
        selectedModel: '',
        modelStatus: 'idle', // idle, loading, loaded, error
        modelStatusText: 'No model selected',
        conversations: [],
        currentConversationId: null,
        messages: [],
        newMessage: '',
        isLoading: false,

        // Initialize
        init() {
            this.loadAvailableModels();
            this.loadConversations();
        },

        // Load available AI models
        async loadAvailableModels() {
            try {
                const response = await fetch('/api/chat/models');
                const data = await response.json();
                if (data.success) {
                    this.availableModels = data.models;
                    // Auto-select first available local model
                    const firstLocalModel = this.availableModels.find(model => model.type === 'local');
                    if (firstLocalModel) {
                        this.selectedModel = firstLocalModel.name;
                        this.loadModel();
                    }
                }
            } catch (error) {
                console.error('Error loading models:', error);
            }
        },

        // Load a specific model
        async loadModel() {
            if (!this.selectedModel) return;
            
            this.modelStatus = 'loading';
            this.modelStatusText = 'Loading model...';
            
            try {
                const response = await fetch('/api/chat/load-model', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ model_name: this.selectedModel })
                });
                
                const data = await response.json();
                if (data.success) {
                    this.modelStatus = 'loaded';
                    this.modelStatusText = 'Model loaded';
                } else {
                    this.modelStatus = 'error';
                    this.modelStatusText = 'Failed to load model';
                }
            } catch (error) {
                this.modelStatus = 'error';
                this.modelStatusText = 'Error loading model';
                console.error('Error loading model:', error);
            }
        },

        // Load conversations
        async loadConversations() {
            try {
                const response = await fetch('/api/chat/conversations');
                const data = await response.json();
                if (data.success) {
                    this.conversations = data.conversations;
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        },

        // Load a specific conversation
        async loadConversation(conversationId) {
            try {
                const response = await fetch(`/api/chat/conversation/${conversationId}`);
                const data = await response.json();
                if (data.success) {
                    this.messages = data.messages;
                    this.currentConversationId = conversationId;
                    this.scrollToBottom();
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        },

        // Create new conversation
        newConversation() {
            this.messages = [];
            this.currentConversationId = null;
            this.newMessage = '';
        },

        // Delete conversation
        async deleteConversation(conversationId) {
            if (!confirm('Are you sure you want to delete this conversation?')) return;
            
            try {
                const response = await fetch(`/api/chat/conversation/${conversationId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    this.loadConversations();
                    if (this.currentConversationId === conversationId) {
                        this.newConversation();
                    }
                }
            } catch (error) {
                console.error('Error deleting conversation:', error);
            }
        },

        // Send message
        async sendMessage() {
            if (!this.newMessage.trim() || this.isLoading) return;
            
            const message = this.newMessage.trim();
            this.newMessage = '';
            this.isLoading = true;
            
            // Add user message to UI immediately
            this.messages.push({
                id: Date.now(),
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });
            
            this.scrollToBottom();
            
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        model_name: this.selectedModel,
                        conversation_id: this.currentConversationId
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    // Add AI response
                    this.messages.push({
                        id: Date.now() + 1,
                        role: 'assistant',
                        content: data.response.content,
                        timestamp: new Date().toISOString()
                    });
                    
                    this.currentConversationId = data.response.conversation_id;
                    this.loadConversations(); // Refresh conversation list
                } else {
                    // Add error message
                    this.messages.push({
                        id: Date.now() + 1,
                        role: 'assistant',
                        content: `Error: ${data.error}`,
                        timestamp: new Date().toISOString()
                    });
                }
            } catch (error) {
                this.messages.push({
                    id: Date.now() + 1,
                    role: 'assistant',
                    content: 'Error: Failed to send message',
                    timestamp: new Date().toISOString()
                });
                console.error('Error sending message:', error);
            } finally {
                this.isLoading = false;
                this.scrollToBottom();
            }
        },

        // Send quick message
        sendQuickMessage(message) {
            this.newMessage = message;
            this.sendMessage();
        },

        // Scroll to bottom of messages
        scrollToBottom() {
            this.$nextTick(() => {
                const container = document.getElementById('messages-container');
                if (container) {
                    container.scrollTop = container.scrollHeight;
                }
            });
        },

        // Format timestamp
        formatTimestamp(timestamp) {
            return new Date(timestamp).toLocaleTimeString();
        }
    }
}
</script>
{% endblock %}
