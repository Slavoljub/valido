<!-- Sample Questions Modal -->
<div
    x-show="sampleQuestionsModal"
    class="fixed inset-0 z-50 overflow-y-auto"
    x-cloak
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
>
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div
            class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
            x-show="sampleQuestionsModal"
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
        ></div>

        <!-- Modal panel -->
        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-6xl sm:w-full"
            x-show="sampleQuestionsModal"
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:translate-y-0 sm:scale-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        >
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <!-- Header -->
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-lightbulb text-white text-lg"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-medium text-gray-900">💡 Sample Questions</h3>
                            <p class="text-sm text-gray-500">Choose a question or type your own</p>
                        </div>
                    </div>
                    <button
                        @click="closeSampleQuestionsModal()"
                        class="text-gray-400 hover:text-gray-600"
                    >
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <!-- Search and Filter -->
                <div class="mb-6">
                    <div class="flex space-x-4 mb-4">
                        <div class="flex-1">
                            <input
                                x-model="questionSearch"
                                type="text"
                                placeholder="Search questions..."
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                        </div>
                        <select
                            x-model="selectedCategory"
                            class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                            <option value="all">All Categories</option>
                            <option value="financial">Financial Analysis</option>
                            <option value="business">Business Intelligence</option>
                            <option value="planning">Planning & Budgeting</option>
                            <option value="reporting">Reporting & Compliance</option>
                            <option value="document">Document Analysis</option>
                            <option value="vision">Vision & Image Analysis</option>
                            <option value="audio">Audio Processing</option>
                            <option value="data">Data Analytics</option>
                        </select>
                    </div>
                </div>

                <!-- Questions Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-96 overflow-y-auto">
                    <!-- Financial Analysis -->
                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-200"
                         x-show="shouldShowCategory('financial')">
                        <h4 class="font-medium text-blue-800 mb-3 flex items-center">
                            <i class="fas fa-chart-line mr-2"></i>
                            📊 Financial Analysis
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('financial')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-blue-200 rounded-lg hover:bg-blue-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-blue-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Business Intelligence -->
                    <div class="bg-green-50 p-4 rounded-lg border border-green-200"
                         x-show="shouldShowCategory('business')">
                        <h4 class="font-medium text-green-800 mb-3 flex items-center">
                            <i class="fas fa-building mr-2"></i>
                            🏢 Business Intelligence
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('business')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-green-200 rounded-lg hover:bg-green-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-green-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Planning & Budgeting -->
                    <div class="bg-purple-50 p-4 rounded-lg border border-purple-200"
                         x-show="shouldShowCategory('planning')">
                        <h4 class="font-medium text-purple-800 mb-3 flex items-center">
                            <i class="fas fa-calendar-alt mr-2"></i>
                            📅 Planning & Budgeting
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('planning')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-purple-200 rounded-lg hover:bg-purple-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-purple-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Reporting & Compliance -->
                    <div class="bg-orange-50 p-4 rounded-lg border border-orange-200"
                         x-show="shouldShowCategory('reporting')">
                        <h4 class="font-medium text-orange-800 mb-3 flex items-center">
                            <i class="fas fa-file-alt mr-2"></i>
                            📋 Reporting & Compliance
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('reporting')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-orange-200 rounded-lg hover:bg-orange-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-orange-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Document Analysis -->
                    <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-200"
                         x-show="shouldShowCategory('document')">
                        <h4 class="font-medium text-indigo-800 mb-3 flex items-center">
                            <i class="fas fa-file-pdf mr-2"></i>
                            📄 Document Analysis
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('document')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-indigo-200 rounded-lg hover:bg-indigo-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-indigo-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Vision & Image Analysis -->
                    <div class="bg-pink-50 p-4 rounded-lg border border-pink-200"
                         x-show="shouldShowCategory('vision')">
                        <h4 class="font-medium text-pink-800 mb-3 flex items-center">
                            <i class="fas fa-image mr-2"></i>
                            🖼️ Vision & Image Analysis
                        </h4>
                        <div class="space-y-2">
                            <template x-for="question in getQuestionsByCategory('vision')" :key="question.id">
                                <button
                                    @click="selectQuestion(question)"
                                    class="w-full text-left p-3 bg-white border border-pink-200 rounded-lg hover:bg-pink-100 transition-colors text-sm"
                                    x-show="matchesSearch(question)"
                                >
                                    <div x-text="question.text"></div>
                                    <div class="text-xs text-pink-600 mt-1" x-text="question.description"></div>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div x-show="getFilteredQuestions().length === 0" class="text-center py-8 text-gray-500">
                    <i class="fas fa-search text-3xl mb-2"></i>
                    <p>No questions found matching your search.</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button
                    @click="closeSampleQuestionsModal()"
                    class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm"
                >
                    Close
                </button>
            </div>
        </div>
    </div>
</div>
