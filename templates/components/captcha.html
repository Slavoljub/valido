<!-- Simple Captcha Component with Theme Support -->
<div x-data="captchaComponent()" class="captcha-container">
    <div class="bg-gray-50 rounded-lg p-4 mb-4"
         :class="{
             'bg-gray-50': $store.theme.currentTheme === 'valido-white',
             'bg-gray-700': $store.theme.currentTheme === 'valido-dark',
             'bg-gray-800': $store.theme.currentTheme === 'dracula',
             'bg-gray-700': $store.theme.currentTheme === 'material-dark'
         }">
        <label class="block text-sm font-medium mb-2"
               :class="{
                   'text-gray-700': $store.theme.currentTheme === 'valido-white',
                   'text-gray-300': $store.theme.currentTheme === 'valido-dark',
                   'text-gray-300': $store.theme.currentTheme === 'dracula',
                   'text-gray-300': $store.theme.currentTheme === 'material-dark'
               }">
            Type the numbers to confirm:
        </label>
        <div class="flex items-center space-x-2 mb-2">
            <span class="text-xl font-bold"
                  :class="{
                      'text-gray-900': $store.theme.currentTheme === 'valido-white',
                      'text-gray-100': $store.theme.currentTheme === 'valido-dark',
                      'text-gray-100': $store.theme.currentTheme === 'dracula',
                      'text-gray-100': $store.theme.currentTheme === 'material-dark'
                  }"
                  x-text="num1">
            </span>
            <span class="text-lg"
                  :class="{
                      'text-gray-600': $store.theme.currentTheme === 'valido-white',
                      'text-gray-400': $store.theme.currentTheme === 'valido-dark',
                      'text-gray-400': $store.theme.currentTheme === 'dracula',
                      'text-gray-400': $store.theme.currentTheme === 'material-dark'
                  }">
                +
            </span>
            <span class="text-xl font-bold"
                  :class="{
                      'text-gray-900': $store.theme.currentTheme === 'valido-white',
                      'text-gray-100': $store.theme.currentTheme === 'valido-dark',
                      'text-gray-100': $store.theme.currentTheme === 'dracula',
                      'text-gray-100': $store.theme.currentTheme === 'material-dark'
                  }"
                  x-text="num2">
            </span>
            <span class="text-lg"
                  :class="{
                      'text-gray-600': $store.theme.currentTheme === 'valido-white',
                      'text-gray-400': $store.theme.currentTheme === 'valido-dark',
                      'text-gray-400': $store.theme.currentTheme === 'dracula',
                      'text-gray-400': $store.theme.currentTheme === 'material-dark'
                  }">
                =
            </span>
        </div>
        <input type="text"
               x-model="input"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
               :class="{
                   'border-gray-300 focus:border-blue-500 focus:ring-blue-500': $store.theme.currentTheme === 'valido-white',
                   'bg-gray-700 border-gray-600 text-gray-100 focus:border-blue-500 focus:ring-blue-500': $store.theme.currentTheme === 'valido-dark',
                   'bg-gray-800 border-gray-600 text-gray-100 focus:border-purple-500 focus:ring-purple-500': $store.theme.currentTheme === 'dracula',
                   'bg-gray-700 border-gray-600 text-gray-100 focus:border-blue-500 focus:ring-blue-500': $store.theme.currentTheme === 'material-dark'
               }"
               placeholder="Enter result">

        <!-- Validation feedback -->
        <div class="mt-2 text-sm"
             :class="{
                 'text-green-600': valid && input.length > 0,
                 'text-red-600': !valid && input.length > 0,
                 'text-gray-500': input.length === 0
             }"
             x-show="input.length > 0"
             x-text="valid ? '✓ Correct!' : '✗ Incorrect, try again'">
        </div>

        <!-- Refresh button -->
        <button @click="refresh()"
                class="mt-2 text-sm underline hover:no-underline transition-colors"
                :class="{
                    'text-blue-600 hover:text-blue-500': $store.theme.currentTheme === 'valido-white',
                    'text-blue-400 hover:text-blue-300': $store.theme.currentTheme === 'valido-dark' || $store.theme.currentTheme === 'dracula'
                }"
                type="button">
            <i class="fas fa-sync-alt mr-1"></i>
            Refresh
        </button>
    </div>
</div>

<script>
function captchaComponent() {
    return {
        num1: 0,
        num2: 0,
        input: '',

        init() {
            this.refresh();
        },

        get valid() {
            return parseInt(this.input) === (this.num1 + this.num2);
        },

        refresh() {
            this.num1 = Math.floor(Math.random() * 10) + 1;
            this.num2 = Math.floor(Math.random() * 10) + 1;
            this.input = '';
        },

        // Expose validation status for parent components
        get isValid() {
            return this.valid;
        },

        get answer() {
            return this.num1 + this.num2;
        },

        reset() {
            this.input = '';
            this.refresh();
        }
    };
}
</script>
