{% macro main_navigation(active_page='dashboard') %}
<!-- Main Navigation Component -->
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40" x-data="{ mobileMenuOpen: false }">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo and primary navigation -->
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a href="{{ url_for('dashboard') }}" class="text-xl font-bold text-gray-900">
            <i class="fas fa-brain text-blue-600 mr-2"></i>
            ValidoAI
          </a>
        </div>

        <!-- Desktop navigation -->
        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
          <a href="{{ url_for('main.home_index') }}"
             class="nav-link {{ 'active' if active_page == 'dashboard' else '' }}"
             :class="{ 'text-blue-600 border-blue-500': activePage === 'dashboard' }">
            <i class="fas fa-tachometer-alt mr-1"></i>Dashboard
          </a>

          <a href="{{ url_for('main.chat_chat_local') }}"
             class="nav-link {{ 'active' if active_page == 'chat' else '' }}"
             :class="{ 'text-blue-600 border-blue-500': activePage === 'chat' }">
            <i class="fas fa-comments mr-1"></i>AI Chat
          </a>

          <a href="{{ url_for('main.settings') }}"
             class="nav-link {{ 'active' if active_page == 'settings' else '' }}"
             :class="{ 'text-blue-600 border-blue-500': activePage === 'settings' }">
            <i class="fas fa-cog mr-1"></i>Settings
          </a>

          <a href="{{ url_for('main.ticketing_index') }}"
             class="nav-link {{ 'active' if active_page == 'ticketing' else '' }}"
             :class="{ 'text-blue-600 border-blue-500': activePage === 'ticketing' }}">
            <i class="fas fa-ticket-alt mr-1"></i>Tickets
          </a>

          <a href="{{ url_for('main.companies_index') }}"
             class="nav-link {{ 'active' if active_page == 'companies' else '' }}"
             :class="{ 'text-blue-600 border-blue-500': activePage === 'companies' }}">
            <i class="fas fa-building mr-1"></i>Companies
          </a>
        </div>
      </div>

      <!-- Right side navigation -->
      <div class="hidden sm:ml-6 sm:flex sm:items-center sm:space-x-4">
        <!-- Theme switcher -->
        <div class="relative" x-data="{ themeOpen: false }">
          <button @click="themeOpen = !themeOpen"
                  class="theme-toggle-btn"
                  aria-label="Theme switcher">
            <i class="fas fa-palette"></i>
          </button>

          <div x-show="themeOpen"
               @click.away="themeOpen = false"
               x-transition:enter="transition ease-out duration-100"
               x-transition:enter-start="transform opacity-0 scale-95"
               x-transition:enter-end="transform opacity-100 scale-100"
               x-transition:leave="transition ease-in duration-75"
               x-transition:leave-start="transform opacity-100 scale-100"
               x-transition:leave-end="transform opacity-0 scale-95"
               class="theme-options">
            <button @click="setTheme('valido-white'); themeOpen = false"
                    class="theme-option active">
              <span class="theme-option-icon bg-gradient-to-br from-white to-gray-100"></span>
              Valido White
            </button>
            <button @click="setTheme('valido-dark'); themeOpen = false"
                    class="theme-option">
              <span class="theme-option-icon bg-gradient-to-br from-gray-800 to-gray-900"></span>
              Valido Dark
            </button>
            <button @click="setTheme('dracula'); themeOpen = false"
                    class="theme-option">
              <span class="theme-option-icon bg-gradient-to-br from-purple-900 to-pink-900"></span>
              Dracula
            </button>
            <button @click="setTheme('material'); themeOpen = false"
                    class="theme-option">
              <span class="theme-option-icon bg-gradient-to-br from-blue-800 to-blue-900"></span>
              Material
            </button>
            <button @click="setTheme('nord'); themeOpen = false"
                    class="theme-option">
              <span class="theme-option-icon bg-gradient-to-br from-blue-400 to-blue-600"></span>
              Nord
            </button>
          </div>
        </div>

        <!-- Notifications -->
        <button class="text-gray-500 hover:text-gray-700 p-2 rounded-md hover:bg-gray-100"
                aria-label="Notifications">
          <i class="fas fa-bell"></i>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">3</span>
        </button>

        <!-- User menu -->
        <div class="relative" x-data="{ userMenuOpen: false }">
          <button @click="userMenuOpen = !userMenuOpen"
                  class="flex items-center text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                  id="user-menu-button">
            <img class="h-8 w-8 rounded-full"
                 src="{{ url_for('static', filename='images/user-avatar.png') }}"
                 alt="User avatar"
                 onerror="this.src='https://ui-avatars.com/api/?name=User&color=7F9CF5&background=EBF4FF'">
          </button>

          <div x-show="userMenuOpen"
               @click.away="userMenuOpen = false"
               x-transition:enter="transition ease-out duration-100"
               x-transition:enter-start="transform opacity-0 scale-95"
               x-transition:enter-end="transform opacity-100 scale-100"
               x-transition:leave="transition ease-in duration-75"
               x-transition:leave-start="transform opacity-100 scale-100"
               x-transition:leave-end="transform opacity-0 scale-95"
               class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
            <a href="{{ url_for('main.profile_index') }}"
               class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-user mr-2"></i>Profile
            </a>
            <a href="{{ url_for('main.settings') }}"
               class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-cog mr-2"></i>Settings
            </a>
            <div class="border-t border-gray-100"></div>
            <a href="{{ url_for('auth.logout') }}"
               class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-sign-out-alt mr-2"></i>Sign out
            </a>
          </div>
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="sm:hidden flex items-center">
        <button @click="mobileMenuOpen = !mobileMenuOpen"
                class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500"
                aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <i class="fas fa-bars" :class="{ 'hidden': mobileMenuOpen }"></i>
          <i class="fas fa-times" :class="{ 'hidden': !mobileMenuOpen }"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile navigation menu -->
  <div class="sm:hidden" :class="{ 'block': mobileMenuOpen, 'hidden': !mobileMenuOpen }">
    <div class="pt-2 pb-3 space-y-1">
      <a href="{{ url_for('main.home_index') }}"
         class="mobile-nav-link {{ 'active' if active_page == 'dashboard' else '' }}"
         @click="mobileMenuOpen = false">
        <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
      </a>
      <a href="{{ url_for('main.chat_chat_local') }}"
         class="mobile-nav-link {{ 'active' if active_page == 'chat' else '' }}"
         @click="mobileMenuOpen = false">
        <i class="fas fa-comments mr-2"></i>AI Chat
      </a>
      <a href="{{ url_for('main.settings') }}"
         class="mobile-nav-link {{ 'active' if active_page == 'settings' else '' }}"
         @click="mobileMenuOpen = false">
        <i class="fas fa-cog mr-2"></i>Settings
      </a>
      <a href="{{ url_for('main.ticketing_index') }}"
         class="mobile-nav-link {{ 'active' if active_page == 'ticketing' else '' }}"
         @click="mobileMenuOpen = false">
        <i class="fas fa-ticket-alt mr-2"></i>Tickets
      </a>
      <a href="{{ url_for('main.companies_index') }}"
         class="mobile-nav-link {{ 'active' if active_page == 'companies' else '' }}"
         @click="mobileMenuOpen = false">
        <i class="fas fa-building mr-2"></i>Companies
      </a>
    </div>
    <div class="pt-4 pb-3 border-t border-gray-200">
      <div class="flex items-center px-4">
        <div class="flex-shrink-0">
          <img class="h-10 w-10 rounded-full"
               src="{{ url_for('static', filename='images/user-avatar.png') }}"
               alt="User avatar"
               onerror="this.src='https://ui-avatars.com/api/?name=User&color=7F9CF5&background=EBF4FF'">
        </div>
        <div class="ml-3">
          <div class="text-base font-medium text-gray-800">User</div>
          <div class="text-sm font-medium text-gray-500">user@example.com</div>
        </div>
      </div>
      <div class="mt-3 space-y-1">
        <a href="{{ url_for('main.profile_index') }}"
           class="mobile-nav-link"
           @click="mobileMenuOpen = false">
          <i class="fas fa-user mr-2"></i>Profile
        </a>
        <a href="{{ url_for('main.settings') }}"
           class="mobile-nav-link"
           @click="mobileMenuOpen = false">
          <i class="fas fa-cog mr-2"></i>Settings
        </a>
        <a href="{{ url_for('auth.logout') }}"
           class="mobile-nav-link"
           @click="mobileMenuOpen = false">
          <i class="fas fa-sign-out-alt mr-2"></i>Sign out
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile menu backdrop -->
<div class="fixed inset-0 z-30 bg-black bg-opacity-25 sm:hidden"
     :class="{ 'block': mobileMenuOpen, 'hidden': !mobileMenuOpen }"
     @click="mobileMenuOpen = false"></div>
{% endmacro %}
