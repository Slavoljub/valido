{% extends "components/base_component.html" %}

{% block component_content %}
<div class="datatable-container {{ config.get('container_class', '') }}">
    <!-- DataTable Controls -->
    <div class="datatable-controls" x-show="{{ config.get('show_controls', True) }}">
        <div class="flex flex-wrap gap-4 items-center justify-between">
            <!-- Search -->
            <div class="datatable-search" x-show="{{ config.get('show_search', True) }}">
                <div class="relative">
                    <input
                        type="search"
                        :placeholder="config.search_placeholder || 'Search...'"
                        class="form-control pl-10"
                        x-model="tableSearch"
                        @input.debounce.300ms="filterTable"
                    >
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="datatable-filters flex gap-2" x-show="{{ config.get('show_filters', False) }}">
                <template x-for="filter in config.filters" :key="filter.key">
                    <select
                        class="form-control"
                        :value="filter.value"
                        @change="updateFilter(filter.key, $event.target.value)"
                    >
                        <option value="">All {{ filter.label }}</option>
                        <template x-for="option in filter.options" :key="option.value">
                            <option :value="option.value" x-text="option.label"></option>
                        </template>
                    </select>
                </template>
            </div>

            <!-- View Controls -->
            <div class="datatable-view-controls flex gap-2" x-show="{{ config.get('show_view_controls', True) }}">
                <button
                    type="button"
                    class="btn btn-outline btn-sm"
                    :class="{ 'bg-blue-100': viewMode === 'table' }"
                    @click="viewMode = 'table'"
                    title="Table View"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0a2 2 0 002 2h10a2 2 0 002-2V8a2 2 0 00-2-2H8a2 2 0 00-2 2v8z"></path>
                    </svg>
                </button>
                <button
                    type="button"
                    class="btn btn-outline btn-sm"
                    :class="{ 'bg-blue-100': viewMode === 'grid' }"
                    @click="viewMode = 'grid'"
                    title="Grid View"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM12 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM12 13a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>
                    </svg>
                </button>
            </div>

            <!-- Bulk Actions -->
            <div class="datatable-bulk-actions" x-show="selectedItems.length > 0 && {{ config.get('show_bulk_actions', True) }}">
                <div class="flex gap-2">
                    <button
                        type="button"
                        class="btn btn-success btn-sm"
                        @click="bulkEdit()"
                        title="Bulk Edit"
                    >
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                        Edit (<span x-text="selectedItems.length"></span>)
                    </button>
                    <button
                        type="button"
                        class="btn btn-danger btn-sm"
                        @click="bulkDelete()"
                        title="Bulk Delete"
                    >
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                        Delete (<span x-text="selectedItems.length"></span>)
                    </button>
                    <button
                        type="button"
                        class="btn btn-warning btn-sm"
                        @click="bulkExport()"
                        title="Bulk Export"
                    >
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        Export
                    </button>
                </div>
            </div>

            <!-- Refresh Button -->
            <button
                type="button"
                class="btn btn-outline btn-sm"
                @click="refreshData()"
                title="Refresh Data"
                x-show="{{ config.get('show_refresh', True) }}"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- DataTable Display -->
    <div class="datatable-display" x-show="viewMode === 'table'">
        <div class="table-responsive">
            <table
                class="datatable-table {{ config.get('table_class', 'display nowrap') }}"
                :class="{ 'stripe': {{ config.get('striped', True) }}, 'hover': {{ config.get('hover', True) }} }"
                style="width:100%"
            >
                <thead>
                    <tr>
                        <!-- Checkbox Column -->
                        <th class="checkbox-column" x-show="{{ config.get('show_checkbox', True) }}">
                            <input
                                type="checkbox"
                                @change="toggleSelectAll()"
                                x-model="selectAll"
                            >
                        </th>

                        <!-- Data Columns -->
                        <template x-for="(column, index) in columns" :key="column.key">
                            <th
                                :class="column.class || ''"
                                :style="column.style || ''"
                                @click="sortBy(column.key)"
                                :title="column.tooltip || ''"
                            >
                                <div class="column-header">
                                    <span x-text="column.label"></span>
                                    <div class="sort-indicators" x-show="column.sortable !== false">
                                        <svg x-show="sortColumn === column.key && sortDirection === 'asc'" class="sort-icon active" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                                        </svg>
                                        <svg x-show="sortColumn === column.key && sortDirection === 'desc'" class="sort-icon active" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7-7-7"></path>
                                        </svg>
                                        <svg x-show="sortColumn !== column.key" class="sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                                        </svg>
                                    </div>
                                </div>
                            </th>
                        </template>

                        <!-- Actions Column -->
                        <th class="actions-column" x-show="{{ config.get('show_actions', True) }}">
                            Actions
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, rowIndex) in paginatedData" :key="getRowKey(row)">
                        <tr
                            class="data-row"
                            :class="{ 'selected': isSelected(row) }"
                            @dblclick="config.onRowDoubleClick ? config.onRowDoubleClick(row) : null"
                        >
                            <!-- Checkbox Cell -->
                            <td class="checkbox-cell" x-show="{{ config.get('show_checkbox', True) }}">
                                <input
                                    type="checkbox"
                                    :value="getRowKey(row)"
                                    x-model="selectedItems"
                                >
                            </td>

                            <!-- Data Cells -->
                            <template x-for="column in columns" :key="column.key">
                                <td
                                    :class="column.cellClass || ''"
                                    :title="getCellTooltip(row, column)"
                                    :contenteditable="column.editable && isEditing(row, column.key)"
                                    @blur="handleCellEdit($event, row, column)"
                                    @keydown.enter.prevent="saveCellEdit($event, row, column)"
                                    @keydown.escape.prevent="cancelCellEdit($event, row, column)"
                                    @click="column.editable ? startCellEdit($event, row, column) : null"
                                    :class="{ 'editable-cell': column.editable, 'editing': isEditing(row, column.key) }"
                                >
                                    <div class="cell-content">
                                        <span x-text="getCellValue(row, column)" :class="{ 'cell-text': true }"></span>
                                        <div x-show="column.tooltip" class="cell-tooltip" x-text="column.tooltip"></div>
                                    </div>
                                </td>
                            </template>

                            <!-- Actions Cell -->
                            <td class="actions-cell" x-show="{{ config.get('show_actions', True) }}">
                                <div class="action-buttons">
                                    <button
                                        type="button"
                                        class="btn btn-sm btn-primary action-btn"
                                        @click="editRow(row)"
                                        title="Edit Row"
                                        x-show="{{ config.get('show_edit', True) }}"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                        </svg>
                                    </button>
                                    <button
                                        type="button"
                                        class="btn btn-sm btn-info action-btn"
                                        @click="viewRow(row)"
                                        title="View Details"
                                        x-show="{{ config.get('show_view', True) }}"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                        </svg>
                                    </button>
                                    <button
                                        type="button"
                                        class="btn btn-sm btn-warning action-btn"
                                        @click="duplicateRow(row)"
                                        title="Duplicate Row"
                                        x-show="{{ config.get('show_duplicate', True) }}"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                        </svg>
                                    </button>
                                    <button
                                        type="button"
                                        class="btn btn-sm btn-danger action-btn"
                                        @click="deleteRow(row)"
                                        title="Delete Row"
                                        x-show="{{ config.get('show_delete', True) }}"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Grid View -->
    <div class="datatable-grid" x-show="viewMode === 'grid'">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <template x-for="(row, index) in paginatedData" :key="getRowKey(row)">
                <div class="card grid-card" :class="{ 'selected': isSelected(row) }">
                    <div class="card-header">
                        <div class="card-checkbox" x-show="{{ config.get('show_checkbox', True) }}">
                            <input
                                type="checkbox"
                                :value="getRowKey(row)"
                                x-model="selectedItems"
                            >
                        </div>
                        <div class="card-actions">
                            <button
                                type="button"
                                class="btn btn-sm btn-primary"
                                @click="editRow(row)"
                                x-show="{{ config.get('show_edit', True) }}"
                            >
                                Edit
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <template x-for="column in columns.slice(0, 6)" :key="column.key">
                            <div class="grid-field">
                                <label x-text="column.label" class="field-label"></label>
                                <div
                                    x-text="getCellValue(row, column)"
                                    class="field-value"
                                    :contenteditable="column.editable && isEditing(row, column.key)"
                                    @blur="handleCellEdit($event, row, column)"
                                    @click="column.editable ? startCellEdit($event, row, column) : null"
                                    :class="{ 'editable-cell': column.editable, 'editing': isEditing(row, column.key) }"
                                ></div>
                            </div>
                        </template>
                    </div>
                    <div class="card-footer">
                        <div class="grid-actions">
                            <button
                                type="button"
                                class="btn btn-xs btn-info"
                                @click="viewRow(row)"
                                x-show="{{ config.get('show_view', True) }}"
                            >
                                View
                            </button>
                            <button
                                type="button"
                                class="btn btn-xs btn-danger"
                                @click="deleteRow(row)"
                                x-show="{{ config.get('show_delete', True) }}"
                            >
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" x-show="paginatedData.length === 0">
        <div class="empty-state-content">
            <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
            </svg>
            <h3 class="empty-state-title">No records found</h3>
            <p class="empty-state-message">Try adjusting your search or filter criteria.</p>
            <button
                type="button"
                class="btn btn-primary"
                @click="refreshData()"
            >
                Refresh Data
            </button>
        </div>
    </div>

    <!-- Pagination -->
    <div class="datatable-pagination" x-show="totalPages > 1 && {{ config.get('show_pagination', True) }}">
        <div class="pagination-container">
            <div class="pagination-info">
                <span x-text="getPaginationInfo()"></span>
                <div class="pagination-size-selector" x-show="{{ config.get('show_page_size', True) }}">
                    <label>Show:</label>
                    <select x-model="pageSize" @change="changePageSize()" class="form-control form-control-sm">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
            <div class="pagination-controls">
                <button
                    type="button"
                    class="btn btn-outline btn-sm"
                    :disabled="currentPage === 1"
                    @click="goToPage(currentPage - 1)"
                >
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Previous
                </button>

                <div class="pagination-pages">
                    <template x-for="page in getVisiblePages()" :key="page">
                        <button
                            type="button"
                            class="pagination-page"
                            :class="{ 'active': page === currentPage }"
                            x-text="page"
                            @click="goToPage(page)"
                        ></button>
                    </template>
                </div>

                <button
                    type="button"
                    class="btn btn-outline btn-sm"
                    :disabled="currentPage === totalPages"
                    @click="goToPage(currentPage + 1)"
                >
                    Next
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" x-show="showConfirmModal" x-cloak>
        <div class="modal-content max-w-md">
            <div class="modal-header">
                <h3 class="modal-title" x-text="confirmModal.title"></h3>
                <button type="button" class="modal-close" @click="closeConfirmModal()">
                    ×
                </button>
            </div>
            <div class="modal-body">
                <p x-text="confirmModal.message"></p>
                <div x-show="confirmModal.type === 'delete'" class="mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Reason (optional)
                    </label>
                    <textarea
                        x-model="confirmModal.reason"
                        class="form-control"
                        rows="3"
                        placeholder="Enter reason..."
                    ></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" @click="closeConfirmModal()">
                    Cancel
                </button>
                <button
                    type="button"
                    class="btn"
                    :class="confirmModal.type === 'delete' ? 'btn-danger' : 'btn-primary'"
                    @click="executeConfirmAction()"
                >
                    <span x-text="confirmModal.confirmText"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block component_styles %}
<style>
.datatable-container {
    gap: 1rem;
}

.datatable-controls {
    
            background-color: var(--valido-bg-primary, #ffffff);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--valido-border, #e5e7eb);
            box-shadow: var(--valido-shadow-sm, 0 1px 2px 0 rgba(0, 0, 0, 0.05));
        
}

.datatable-table {
    width: 100%;
}

.datatable-table th,
.datatable-table td {
    
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--valido-border, #e5e7eb);
        
}

.datatable-table th {
    @apply bg-gray-50 font-semibold text-gray-900 text-left;
}

.datatable-table tbody tr:hover {
    @apply bg-gray-50;
}

.datatable-table tbody tr.selected {
    @apply bg-blue-50 border-l-4 border-blue-500;
}

.checkbox-column {
    @apply w-12;
}

.actions-column {
    @apply w-32;
}

.column-header {
    @apply flex items-center justify-between cursor-pointer select-none;
}

.sort-indicators {
    @apply flex flex-col ml-2;
}

.sort-icon {
    @apply w-3 h-3 opacity-30 transition-opacity;
}

.sort-icon.active {
    @apply opacity-100;
}

.editable-cell {
    @apply cursor-pointer transition-colors;
}

.editable-cell:hover {
    @apply bg-blue-50;
}

.editable-cell.editing {
    @apply bg-yellow-50 border-2 border-yellow-400;
}

.editable-input {
    @apply w-full border-none outline-none bg-transparent font-inherit color-inherit;
}

.editable-input:focus {
    @apply bg-white;
}

.action-buttons {
    @apply flex gap-1;
}

.action-btn {
    @apply p-1 rounded transition-colors;
}

.grid-card {
    @apply border border-gray-200 rounded-lg overflow-hidden transition-all duration-200;
}

.grid-card:hover {
    @apply shadow-md transform scale-105;
}

.grid-card.selected {
    @apply border-blue-500 bg-blue-50;
}

.card-header {
    @apply flex justify-between items-center p-3 bg-gray-50 border-b border-gray-200;
}

.card-body {
    @apply p-4;
}

.card-footer {
    @apply p-3 bg-gray-50 border-t border-gray-200;
}

.grid-field {
    @apply mb-3;
}

.field-label {
    @apply text-xs font-medium text-gray-500 mb-1 block;
}

.field-value {
    @apply text-sm text-gray-900;
}

.grid-actions {
    @apply flex gap-2;
}

.empty-state {
    @apply flex items-center justify-center py-12;
}

.empty-state-content {
    @apply text-center;
}

.empty-state-icon {
    @apply w-12 h-12 mx-auto mb-4 text-gray-400;
}

.empty-state-title {
    @apply text-lg font-medium text-gray-900 mb-2;
}

.empty-state-message {
    @apply text-gray-500 mb-4;
}

.pagination-container {
    @apply flex justify-between items-center py-4 border-t border-gray-200;
}

.pagination-info {
    @apply flex items-center gap-4 text-sm text-gray-700;
}

.pagination-size-selector {
    @apply flex items-center gap-2;
}

.pagination-controls {
    @apply flex items-center gap-2;
}

.pagination-pages {
    @apply flex gap-1 mx-4;
}

.pagination-page {
    @apply px-3 py-1 text-sm border border-gray-300 bg-white text-gray-700 rounded hover:bg-gray-50 transition-colors min-w-8 text-center;
}

.pagination-page.active {
    @apply bg-blue-600 text-white border-blue-600;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .datatable-controls {
        @apply flex-col space-y-4;
    }

    .datatable-controls .flex {
        @apply flex-col space-y-2;
    }

    .action-buttons {
        @apply flex-col;
    }

    .grid-card {
        @apply mx-auto max-w-sm;
    }
}

/* Loading states */
.datatable-container.loading {
    position: relative;
}

.datatable-container.loading::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    border-radius: inherit;
}

.datatable-container.loading::after {
    content: '';
    width: 2rem;
    height: 2rem;
    border: 3px solid var(--accent-primary);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* Print styles */
@media print {
    .datatable-controls,
    .action-buttons,
    .pagination-container {
        @apply hidden;
    }

    .datatable-table {
        @apply border-collapse;
    }

    .datatable-table th,
    .datatable-table td {
        @apply border border-gray-300 p-2;
    }
}
</style>
{% endblock %}

{% block component_scripts %}
<script>
function dataTableComponent() {
    return {
        // Data
        data: {{ config.get('data', []) | tojson }},
        columns: {{ config.get('columns', []) | tojson }},
        filters: {{ config.get('filters', []) | tojson }},

        // State
        tableSearch: '',
        selectedItems: [],
        selectAll: false,
        currentPage: 1,
        pageSize: {{ config.get('page_size', 25) }},
        sortColumn: null,
        sortDirection: null,
        viewMode: 'table',
        editingCell: null,
        showConfirmModal: false,
        confirmModal: {
            title: '',
            message: '',
            type: '',
            confirmText: '',
            reason: '',
            action: null
        },

        // Computed
        get filteredData() {
            let filtered = [...this.data];

            // Apply search filter
            if (this.tableSearch) {
                filtered = filtered.filter(row => {
                    return this.columns.some(col => {
                        const value = this.getCellValue(row, col);
                        return value && value.toString().toLowerCase().includes(this.tableSearch.toLowerCase());
                    });
                });
            }

            // Apply column filters
            this.filters.forEach(filter => {
                if (filter.value) {
                    filtered = filtered.filter(row => {
                        const value = row[filter.key];
                        return value && value.toString() === filter.value.toString();
                    });
                }
            });

            // Apply sorting
            if (this.sortColumn) {
                filtered.sort((a, b) => {
                    let aVal = a[this.sortColumn] || '';
                    let bVal = b[this.sortColumn] || '';

                    if (this.sortDirection === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
            }

            return filtered;
        },

        get paginatedData() {
            const start = (this.currentPage - 1) * this.pageSize;
            const end = start + this.pageSize;
            return this.filteredData.slice(start, end);
        },

        get totalPages() {
            return Math.ceil(this.filteredData.length / this.pageSize);
        },

        get totalRecords() {
            return this.data.length;
        },

        get filteredRecords() {
            return this.filteredData.length;
        },

        // Methods
        init() {
            console.log('DataTable component initialized');
            this.loadData();
        },

        loadData() {
            // Load data from API if configured
            if ({{ config.get('api_url') | tojson }}) {
                this.fetchData();
            }
        },

        fetchData() {
            const url = {{ config.get('api_url') | tojson }};
            fetch(url)
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        this.data = result.data;
                    }
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    this.showToast('Error', 'Failed to load data', 'error');
                });
        },

        getRowKey(row) {
            return row.id || row._id || row.pk || row.uuid || Math.random().toString(36).substr(2, 9);
        },

        getCellValue(row, column) {
            if (column.formatter) {
                return column.formatter(row[column.key], row);
            }
            return row[column.key] || '';
        },

        getCellTooltip(row, column) {
            return column.tooltip || '';
        },

        isSelected(row) {
            return this.selectedItems.includes(this.getRowKey(row));
        },

        toggleSelectAll() {
            if (this.selectAll) {
                this.selectedItems = this.paginatedData.map(row => this.getRowKey(row));
            } else {
                this.selectedItems = [];
            }
        },

        sortBy(columnKey) {
            const column = this.columns.find(col => col.key === columnKey);
            if (column.sortable === false) return;

            if (this.sortColumn === columnKey) {
                this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                this.sortColumn = columnKey;
                this.sortDirection = 'asc';
            }
        },

        getPaginationInfo() {
            const start = ((this.currentPage - 1) * this.pageSize) + 1;
            const end = Math.min(this.currentPage * this.pageSize, this.filteredRecords);
            return `Showing ${start} to ${end} of ${this.filteredRecords} entries`;
        },

        getVisiblePages() {
            const totalPages = this.totalPages;
            const currentPage = this.currentPage;
            const delta = 2;
            const range = [];
            const rangeWithDots = [];

            for (let i = Math.max(2, currentPage - delta); i <= Math.min(totalPages - 1, currentPage + delta); i++) {
                range.push(i);
            }

            if (currentPage - delta > 2) {
                rangeWithDots.push(1, '...');
            } else {
                rangeWithDots.push(1);
            }

            rangeWithDots.push(...range);

            if (currentPage + delta < totalPages - 1) {
                rangeWithDots.push('...', totalPages);
            } else if (totalPages > 1) {
                rangeWithDots.push(totalPages);
            }

            return rangeWithDots;
        },

        goToPage(page) {
            if (page !== '...' && page >= 1 && page <= this.totalPages) {
                this.currentPage = page;
            }
        },

        changePageSize() {
            this.currentPage = 1;
        },

        // Live editing methods
        isEditing(row, columnKey) {
            const rowKey = this.getRowKey(row);
            return this.editingCell && this.editingCell.rowKey === rowKey && this.editingCell.columnKey === columnKey;
        },

        startCellEdit(event, row, column) {
            if (!column.editable) return;

            const rowKey = this.getRowKey(row);
            this.editingCell = {
                rowKey: rowKey,
                columnKey: column.key,
                originalValue: row[column.key],
                currentValue: row[column.key]
            };

            // Focus the editable element
            setTimeout(() => {
                const target = event.target;
                if (target.contentEditable === 'true') {
                    target.focus();
                    // Select all text
                    const range = document.createRange();
                    range.selectNodeContents(target);
                    const selection = window.getSelection();
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }, 10);
        },

        handleCellEdit(event, row, column) {
            if (!this.isEditing(row, column.key)) return;

            const newValue = event.target.textContent;
            this.editingCell.currentValue = newValue;
        },

        saveCellEdit(event, row, column) {
            if (!this.isEditing(row, column.key)) return;

            const newValue = this.editingCell.currentValue;
            const originalValue = this.editingCell.originalValue;

            if (newValue !== originalValue) {
                // Update the row data
                row[column.key] = newValue;

                // Call update API if configured
                if ({{ config.get('update_api_url') | tojson }}) {
                    this.updateCell(row, column.key, newValue, originalValue);
                }

                this.showToast('Success', `${column.label} updated successfully`, 'success');
            }

            this.editingCell = null;
        },

        cancelCellEdit(event, row, column) {
            if (!this.isEditing(row, column.key)) return;

            // Restore original value
            row[column.key] = this.editingCell.originalValue;
            this.editingCell = null;
        },

        updateCell(row, columnKey, newValue, originalValue) {
            const url = {{ config.get('update_api_url') | tojson }};
            const rowKey = this.getRowKey(row);

            fetch(`${url}/${rowKey}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    [columnKey]: newValue,
                    original_value: originalValue
                })
            })
            .then(response => response.json())
            .then(result => {
                if (!result.success) {
                    // Revert on error
                    row[columnKey] = originalValue;
                    this.showToast('Error', 'Failed to update cell', 'error');
                }
            })
            .catch(error => {
                // Revert on error
                row[columnKey] = originalValue;
                console.error('Error updating cell:', error);
                this.showToast('Error', 'Failed to update cell', 'error');
            });
        },

        // Action methods
        editRow(row) {
            if (typeof {{ config.get('on_edit', 'null') }} === 'function') {
                {{ config.get('on_edit', 'null') }}(row);
            } else {
                console.log('Edit row:', row);
            }
        },

        viewRow(row) {
            if (typeof {{ config.get('on_view', 'null') }} === 'function') {
                {{ config.get('on_view', 'null') }}(row);
            } else {
                console.log('View row:', row);
            }
        },

        deleteRow(row) {
            this.showConfirmModal(
                'Delete Record',
                'Are you sure you want to delete this record? This action cannot be undone.',
                'delete',
                'Delete',
                () => {
                    if (typeof {{ config.get('on_delete', 'null') }} === 'function') {
                        {{ config.get('on_delete', 'null') }}(row, this.confirmModal.reason);
                    } else {
                        console.log('Delete row:', row, this.confirmModal.reason);
                    }
                }
            );
        },

        duplicateRow(row) {
            if (typeof {{ config.get('on_duplicate', 'null') }} === 'function') {
                {{ config.get('on_duplicate', 'null') }}(row);
            } else {
                console.log('Duplicate row:', row);
            }
        },

        // Bulk operations
        bulkEdit() {
            if (this.selectedItems.length === 0) return;

            if (typeof {{ config.get('on_bulk_edit', 'null') }} === 'function') {
                {{ config.get('on_bulk_edit', 'null') }}(this.selectedItems);
            } else {
                console.log('Bulk edit items:', this.selectedItems);
            }
        },

        bulkDelete() {
            if (this.selectedItems.length === 0) return;

            this.showConfirmModal(
                'Delete Selected Records',
                `Are you sure you want to delete ${this.selectedItems.length} records? This action cannot be undone.`,
                'delete',
                'Delete All',
                () => {
                    if (typeof {{ config.get('on_bulk_delete', 'null') }} === 'function') {
                        {{ config.get('on_bulk_delete', 'null') }}(this.selectedItems, this.confirmModal.reason);
                    } else {
                        console.log('Bulk delete items:', this.selectedItems, this.confirmModal.reason);
                    }
                }
            );
        },

        bulkExport() {
            if (this.selectedItems.length === 0) return;

            if (typeof {{ config.get('on_bulk_export', 'null') }} === 'function') {
                {{ config.get('on_bulk_export', 'null') }}(this.selectedItems);
            } else {
                console.log('Bulk export items:', this.selectedItems);
            }
        },

        // Confirmation modal
        showConfirmModal(title, message, type, confirmText, action) {
            this.confirmModal = {
                title,
                message,
                type,
                confirmText,
                reason: '',
                action
            };
            this.showConfirmModal = true;
        },

        closeConfirmModal() {
            this.showConfirmModal = false;
            this.confirmModal = {
                title: '',
                message: '',
                type: '',
                confirmText: '',
                reason: '',
                action: null
            };
        },

        executeConfirmAction() {
            if (this.confirmModal.action) {
                this.confirmModal.action();
            }
            this.closeConfirmModal();
        },

        // Filter methods
        updateFilter(filterKey, value) {
            const filter = this.filters.find(f => f.key === filterKey);
            if (filter) {
                filter.value = value;
                this.currentPage = 1; // Reset to first page
            }
        },

        filterTable() {
            this.currentPage = 1; // Reset to first page when filtering
        },

        refreshData() {
            this.loadData();
            this.showToast('Success', 'Data refreshed successfully', 'success');
        },

        // Toast notification
        showToast(title, message, type = 'info', duration = 5000) {
            // Use global toast system
            if (window.appData && typeof window.appData.showToast === 'function') {
                window.appData.showToast(title, message, type, duration);
            } else {
                console.log(`[${type.toUpperCase()}] ${title}: ${message}`);
            }
        }
    }
}
</script>
{% endblock %}
