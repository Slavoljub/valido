<!-- Reusable Database Card Component -->
<div class="bg-gradient-to-br {{ bg_gradient }} rounded-xl p-6 border {{ border_color }} hover:shadow-lg transition-all duration-300">
    <div class="flex items-start justify-between mb-4">
        <div class="flex items-center gap-3">
            <div class="p-3 {{ icon_bg }} rounded-lg">
                <i class="{{ icon }} text-white text-xl"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ name }}</h3>
                <p class="text-sm text-gray-600 dark:text-gray-300">{{ path }}</p>
            </div>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 {{ status_bg }} rounded-full">
            <i class="fas fa-circle text-{{ status_color }}-500 text-xs"></i>
            <span class="text-xs font-medium text-{{ status_color }}-700 dark:text-{{ status_color }}-400">{{ status }}</span>
        </div>
    </div>
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="text-center">
            <div class="text-2xl font-bold text-{{ theme_color }}-600 dark:text-{{ theme_color }}-400">{{ tables }}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400 font-medium">Tables</div>
        </div>
        <div class="text-center">
            <div class="text-2xl font-bold text-{{ theme_color }}-600 dark:text-{{ theme_color }}-400">{{ records }}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400 font-medium">Records</div>
        </div>
        <div class="text-center">
            <div class="text-2xl font-bold text-{{ theme_color }}-600 dark:text-{{ theme_color }}-400">{{ size }}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400 font-medium">Size</div>
        </div>
    </div>
    <div class="flex gap-2">
        {% if view_tables_action %}
        <button onclick="{{ view_tables_action }}"
                class="flex-1 px-3 py-2 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-{{ theme_color }}-600 dark:text-{{ theme_color }}-400 font-medium rounded-lg transition-all duration-200 flex items-center justify-center gap-2">
            <i class="fas fa-table text-sm"></i>
            <span>Tables</span>
        </button>
        {% endif %}
        {% if test_connection_action %}
        <button onclick="{{ test_connection_action }}"
                class="flex-1 px-3 py-2 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-{{ theme_color }}-600 dark:text-{{ theme_color }}-400 font-medium rounded-lg transition-all duration-200 flex items-center justify-center gap-2">
            <i class="fas fa-plug text-sm"></i>
            <span>Test</span>
        </button>
        {% endif %}
    </div>
</div>
