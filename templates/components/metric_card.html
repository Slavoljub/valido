<!-- Reusable Metric Card Component -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6 hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
    <div class="flex items-center justify-between">
        <div class="p-3 {{ icon_bg }} rounded-lg">
            <i class="{{ icon }} text-2xl {{ icon_color }}"></i>
        </div>
        <div class="text-right">
            <div class="text-2xl font-bold text-gray-900 dark:text-white">{{ value }}</div>
            <div class="text-sm text-gray-500 dark:text-gray-400 font-medium">{{ label }}</div>
            {% if change and change_value %}
            <div class="flex items-center gap-1 mt-1">
                <i class="fas fa-{{ change_icon }} text-{{ change_color }}-500 text-xs"></i>
                <span class="text-xs text-{{ change_color }}-600 dark:text-{{ change_color }}-400 font-medium">{{ change_value }}</span>
            </div>
            {% endif %}
        </div>
    </div>
</div>
