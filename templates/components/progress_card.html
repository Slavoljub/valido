<!-- Reusable Progress Card Component -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ title }}</h3>
        {% if view_all_link %}
        <a href="{{ view_all_link }}" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 text-sm font-medium transition-colors duration-200">
            {{ view_all_text or 'View All' }}
        </a>
        {% endif %}
    </div>
    <div class="space-y-6">
        {% for item in items %}
        <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-medium text-gray-600 dark:text-gray-300">{{ item.name }}</span>
                <span class="text-xl font-bold text-gray-900 dark:text-white">{{ item.value }}</span>
            </div>
            <div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-2 mb-2">
                <div class="bg-{{ item.color or 'blue' }}-500 h-2 rounded-full transition-all duration-300" style="width: {{ item.percentage }}%"></div>
            </div>
            <div class="text-xs text-gray-500 dark:text-gray-400">{{ item.description }}</div>
        </div>
        {% endfor %}
    </div>
</div>
