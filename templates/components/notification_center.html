<!-- Modern Notification Center Component -->
<div class="notification-center" x-data="notificationCenter()" x-show="isOpen">
    <!-- Overlay -->
    <div class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm z-40"
         @click="closeCenter()"
         x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
    </div>

    <!-- Notification Panel -->
    <div class="fixed top-0 right-0 h-full w-full max-w-md bg-white dark:bg-gray-800 shadow-2xl z-50 transform"
         :class="{ 'translate-x-0': isOpen, 'translate-x-full': !isOpen }"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full">

        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-bell text-white"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white">Notifications</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400" x-text="`${unreadCount} unread`"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button @click="markAllRead()" class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 font-medium">
                    Mark all read
                </button>
                <button @click="closeCenter()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700">
            <button @click="activeFilter = 'all'"
                    :class="{ 'border-blue-500 text-blue-600': activeFilter === 'all', 'border-transparent text-gray-500': activeFilter !== 'all' }"
                    class="flex-1 py-3 px-4 text-sm font-medium border-b-2 transition-colors">
                All
            </button>
            <button @click="activeFilter = 'unread'"
                    :class="{ 'border-blue-500 text-blue-600': activeFilter === 'unread', 'border-transparent text-gray-500': activeFilter !== 'unread' }"
                    class="flex-1 py-3 px-4 text-sm font-medium border-b-2 transition-colors">
                Unread
            </button>
            <button @click="activeFilter = 'important'"
                    :class="{ 'border-blue-500 text-blue-600': activeFilter === 'important', 'border-transparent text-gray-500': activeFilter !== 'important' }"
                    class="flex-1 py-3 px-4 text-sm font-medium border-b-2 transition-colors">
                Important
            </button>
        </div>

        <!-- Notifications List -->
        <div class="flex-1 overflow-y-auto">
            <div x-show="filteredNotifications.length === 0" class="flex flex-col items-center justify-center py-12">
                <i class="fas fa-bell-slash text-gray-400 text-4xl mb-4"></i>
                <p class="text-gray-500 dark:text-gray-400 text-center">No notifications found</p>
                <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">You're all caught up!</p>
            </div>

            <div class="divide-y divide-gray-200 dark:divide-gray-700">
                <div x-for="notification in filteredNotifications"
                     :key="notification.id"
                     class="p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer"
                     :class="{ 'bg-blue-50 dark:bg-blue-900/20': !notification.read }"
                     @click="markAsRead(notification.id)">

                    <div class="flex items-start gap-3">
                        <!-- Icon -->
                        <div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center"
                             :class="getIconClasses(notification.type)">
                            <i :class="notification.icon" class="text-white text-sm"></i>
                        </div>

                        <!-- Content -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-2">
                                <div class="flex-1">
                                    <h4 class="text-sm font-semibold text-gray-900 dark:text-white mb-1"
                                        x-text="notification.title"></h4>
                                    <p class="text-sm text-gray-600 dark:text-gray-300 mb-2"
                                       x-text="notification.message"></p>
                                    <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">
                                        <span x-text="formatTime(notification.timestamp)"></span>
                                        <span x-show="notification.category" class="px-2 py-1 bg-gray-100 dark:bg-gray-600 rounded-full"
                                              x-text="notification.category"></span>
                                    </div>
                                </div>

                                <!-- Actions -->
                                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click.stop="archiveNotification(notification.id)"
                                            class="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded transition-colors">
                                        <i class="fas fa-archive text-gray-400 text-xs"></i>
                                    </button>
                                    <button @click.stop="deleteNotification(notification.id)"
                                            class="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded transition-colors">
                                        <i class="fas fa-trash text-red-400 text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Unread Indicator -->
                        <div x-show="!notification.read" class="w-2 h-2 bg-blue-500 rounded-full flex-shrink-0"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="border-t border-gray-200 dark:border-gray-700 p-4">
            <div class="flex items-center justify-between">
                <button @click="loadMore()" class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 font-medium">
                    Load More
                </button>
                <button @click="clearAll()" class="text-sm text-red-600 dark:text-red-400 hover:text-red-700 font-medium">
                    Clear All
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function notificationCenter() {
    return {
        isOpen: false,
        activeFilter: 'all',
        notifications: [
            {
                id: 1,
                title: 'New Order Received',
                message: 'Order #12345 has been placed by Acme Corporation',
                type: 'success',
                icon: 'fas fa-shopping-cart',
                timestamp: new Date(Date.now() - 5 * 60 * 1000), // 5 minutes ago
                read: false,
                important: false,
                category: 'Orders'
            },
            {
                id: 2,
                title: 'Payment Failed',
                message: 'Payment for invoice #INV-2024-001 could not be processed',
                type: 'error',
                icon: 'fas fa-exclamation-triangle',
                timestamp: new Date(Date.now() - 15 * 60 * 1000), // 15 minutes ago
                read: false,
                important: true,
                category: 'Payments'
            },
            {
                id: 3,
                title: 'New User Registration',
                message: 'John Smith has registered for a new account',
                type: 'info',
                icon: 'fas fa-user-plus',
                timestamp: new Date(Date.now() - 2 * 60 * 60 * 1000), // 2 hours ago
                read: true,
                important: false,
                category: 'Users'
            },
            {
                id: 4,
                title: 'System Maintenance',
                message: 'Scheduled maintenance will begin in 30 minutes',
                type: 'warning',
                icon: 'fas fa-tools',
                timestamp: new Date(Date.now() - 6 * 60 * 60 * 1000), // 6 hours ago
                read: true,
                important: true,
                category: 'System'
            },
            {
                id: 5,
                title: 'Report Generated',
                message: 'Monthly sales report is ready for download',
                type: 'success',
                icon: 'fas fa-chart-bar',
                timestamp: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000), // 1 day ago
                read: true,
                important: false,
                category: 'Reports'
            }
        ],

        get unreadCount() {
            return this.notifications.filter(n => !n.read).length;
        },

        get filteredNotifications() {
            let filtered = this.notifications;

            switch (this.activeFilter) {
                case 'unread':
                    filtered = filtered.filter(n => !n.read);
                    break;
                case 'important':
                    filtered = filtered.filter(n => n.important);
                    break;
            }

            return filtered.sort((a, b) => b.timestamp - a.timestamp);
        },

        openCenter() {
            this.isOpen = true;
        },

        closeCenter() {
            this.isOpen = false;
        },

        markAsRead(id) {
            const notification = this.notifications.find(n => n.id === id);
            if (notification) {
                notification.read = true;
            }
        },

        markAllRead() {
            this.notifications.forEach(n => n.read = true);
        },

        archiveNotification(id) {
            // Archive logic here
            console.log('Archive notification:', id);
        },

        deleteNotification(id) {
            const index = this.notifications.findIndex(n => n.id === id);
            if (index > -1) {
                this.notifications.splice(index, 1);
            }
        },

        clearAll() {
            this.notifications = [];
        },

        loadMore() {
            // Load more notifications logic
            console.log('Loading more notifications...');
        },

        getIconClasses(type) {
            const classes = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            return classes[type] || 'bg-gray-500';
        },

        formatTime(timestamp) {
            const now = new Date();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return `${days}d ago`;
        }
    };
}

// Global notification trigger
window.showNotificationCenter = function() {
    const center = document.querySelector('[x-data*="notificationCenter"]');
    if (center && center.__x) {
        center.__x.$data.openCenter();
    }
};
</script>

<style>
/* Notification Center Styles */
.notification-center {
    font-family: 'Inter', system-ui, sans-serif;
}

/* Smooth transitions for mobile */
@media (max-width: 768px) {
    .notification-center .fixed {
        width: 100%;
        max-width: none;
    }
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
    .notification-center {
        /* Dark mode styles are handled by Tailwind classes */
    }
}

/* Animation improvements */
[x-show="true"][x-transition] {
    display: block !important;
}

/* Custom scrollbar */
.notification-center .overflow-y-auto::-webkit-scrollbar {
    width: 4px;
}

.notification-center .overflow-y-auto::-webkit-scrollbar-track {
    background: #f1f5f9;
}

.notification-center .overflow-y-auto::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 2px;
}

.notification-center .overflow-y-auto::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
}

.dark .notification-center .overflow-y-auto::-webkit-scrollbar-track {
    background: #374151;
}

.dark .notification-center .overflow-y-auto::-webkit-scrollbar-thumb {
    background: #6b7280;
}

.dark .notification-center .overflow-y-auto::-webkit-scrollbar-thumb:hover {
    background: #9ca3af;
}
</style>
