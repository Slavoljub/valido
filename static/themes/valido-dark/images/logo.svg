<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with dark theme colors -->
  <circle cx="20" cy="20" r="18" fill="#3B82F6" stroke="#60A5FA" stroke-width="2"/>
  
  <!-- V letter in white -->
  <path d="M12 8L20 28L28 8" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI text in light color for dark theme -->
  <text x="45" y="25" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#F8FAFC">ValidoAI</text>
  
  <!-- Decorative elements with glow effect -->
  <circle cx="15" cy="15" r="2" fill="white" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="15" r="1.5" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Subtle glow effect around the logo -->
  <circle cx="20" cy="20" r="22" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="22;24;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
