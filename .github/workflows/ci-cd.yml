name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: "Test Suite"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_valido_online
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ai_valido_online
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-mock
        pip install redis psycopg2-binary pymysql

    - name: Create test databases
      run: |
        # PostgreSQL setup
        PGPASSWORD=postgres psql -h localhost -U postgres -d ai_valido_online -c "CREATE EXTENSION IF NOT EXISTS vector;"

        # MySQL setup
        mysql -h localhost -u root -proot ai_valido_online -e "SELECT 1;"

    - name: Run TDD Tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Run Security Tests
      run: |
        pip install bandit safety
        bandit -r src/ -f json -o bandit-report.json || true
        safety check --json --output safety-report.json || true

    - name: Performance Tests
      run: |
        pytest tests/test_redis_cache_manager.py::TestRedisCacheManagerIntegration::test_cache_manager_performance -v

  lint:
    name: "Code Quality"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 isort mypy bandit safety

    - name: Run Black (Code Formatting)
      run: |
        black --check --diff src/ tests/

    - name: Run isort (Import Sorting)
      run: |
        isort --check-only --diff src/ tests/

    - name: Run Flake8 (Linting)
      run: |
        flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503

    - name: Run MyPy (Type Checking)
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional

    - name: Run Bandit (Security)
      run: |
        bandit -r src/ -f json -o bandit-report.json
        cat bandit-report.json

  integration:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [test, lint]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_valido_online
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install redis psycopg2-binary

    - name: Create test environment file
      run: |
        cat > .env << EOF
        FLASK_APP=app.py
        FLASK_ENV=testing
        SECRET_KEY=test-secret-key
        DATABASE_TYPE=sqlite
        DB_TYPE=sqlite
        DB_NAME=data/sqlite/test.db
        REDIS_ENABLED=true
        REDIS_HOST=localhost
        REDIS_PORT=6379
        POSTGRES_HOST=localhost
        POSTGRES_PORT=5432
        POSTGRES_USER=postgres
        POSTGRES_PASSWORD=postgres
        POSTGRES_NAME=ai_valido_online
        AI_SAFETY_ENABLED=true
        AI_GUARD_RAILS_ENABLED=true
        AI_DATA_ISOLATION_ENABLED=true
        DEFAULT_PROMPT=You are a helpful AI assistant for testing.
        DEFAULT_GREETING=Hello! I'm here to help with testing.
        AI_RULES=Be helpful, accurate, and safe.
        EOF

    - name: Run Integration Tests
      run: |
        pytest tests/ -k "integration" -v --tb=short

    - name: Database Connection Tests
      run: |
        python -c "
        from src.ai_local_models.database_manager import db_manager
        from src.ai_local_models.redis_cache_manager import redis_cache
        from src.ai_local_models.ai_safety_manager import ai_safety_manager

        print('Testing database connections...')
        health = db_manager.health_check()
        for db_name, status in health.items():
            print(f'{db_name}: {status}')

        print('Testing Redis connection...')
        redis_health = redis_cache.health_check()
        print(f'Redis: {redis_health}')

        print('Testing AI Safety Manager...')
        safety_stats = ai_safety_manager.get_safety_stats()
        print(f'Safety Stats: {safety_stats}')
        "

  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [test, lint, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Production
      run: |
        echo "🚀 Deploying to production..."
        # Add your deployment commands here
        echo "✅ Deployment completed!"

  notify:
    name: "Notification"
    runs-on: ubuntu-latest
    needs: [test, lint, integration, deploy]
    if: always()

    steps:
    - name: Send notification
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ All CI/CD checks passed!"
        else
          echo "❌ Some CI/CD checks failed!"
        fi

        # You can add Slack, Discord, or email notifications here
        echo "Notification sent to team"
