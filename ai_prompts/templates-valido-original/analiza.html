<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const ctx = document.getElementById('myChart').getContext('2d');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const chatResponse = document.getElementById('chat-response');
        const footer = document.querySelector('footer');
        let myChart = null;

    // ✅ Inicijalizacija grafikona sa unapređenim dizajnom
        myChart = new Chart(ctx, {
            type: 'line',  
            data: { labels: [], datasets: [] },
            options: {
                responsive: true,
            animation: { duration: 2000 }, // Animacija učitavanja grafikona
            plugins: {
                legend: { position: 'top', labels: { color: '#333', font: { size: 14, family: "Arial, sans-serif" } } },
                title: { display: true, text: '📊', color: '#222', font: { size: 18, weight: 'bold' } }
            },
            scales: {
                x: { ticks: { color: '#333', font: { size: 12 } }, grid: { color: '#ddd' } },
                y: { ticks: { color: '#333', font: { size: 12 } }, grid: { color: '#ddd' } }
            }
        }
    });

    // ✅ Poboljšan efekat kucanja sa lepšim tempom i formatiranjem
        function typeWriter(text, element, speed = 100) {
            let i = 0;
            element.innerHTML = "";  
            const typingElement = document.createElement("p");
            typingElement.classList.add("typing-effect");
            element.appendChild(typingElement);

            function typing() {
                if (i < text.length) {
                    typingElement.textContent += text.charAt(i);

            // Dodajemo novi red kada naiđemo na tačku, dvotačku ili zarez
                    if (text.charAt(i) === '.' || text.charAt(i) === ':' || text.charAt(i) === ',') {
                typingElement.innerHTML += "<br><br>"; // Dodajemo razmak za lepši prikaz
            }

            i++;
            setTimeout(typing, speed);
        } else {
            typingElement.classList.remove("typing-effect"); // Uklanjamo animaciju kada se završi
        }
    }
    typing();
}


    // ✅ Obrada klika na dugme "Pošalji"
sendButton.addEventListener('click', () => {
    const userMessage = chatInput.value.trim();

    if (!userMessage) {
        alert("Molimo vas da unesete pitanje!");
        return;
    }

    chatResponse.innerHTML = '<p class="text-primary typing">Molimo vas, sačekajte...</p>';  

    fetch('/api/analiza_chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: "user", content: userMessage }] }),
    })
    .then((response) => response.json())
    .then(async (data) => {
        chatResponse.innerHTML = "";
        if (data.response) {
            typeWriter(data.response, chatResponse, 50);

            if (data.data) {
                    // ✅ Kreiranje grafikona sa poboljšanim vizuelnim efektima
                await renderChart(ctx, data.data).then(chart => myChart = chart);

                    // ✅ Dodavanje dugmeta za otvaranje modala
                footer.innerHTML = `
                <button class="btn btn-primary" id="openAnalysisModal" data-bs-toggle="modal" data-bs-target="#printModal">
                📄 Štampaj Analizu
                </button>
                `;
            }
        } else {
            typeWriter("Nažalost, ne mogu da pronađem relevantne podatke.", chatResponse);
        }
    })
    .catch((error) => {
        console.error("Greška u komunikaciji sa serverom:", error);
        typeWriter("Došlo je do greške u komunikaciji sa serverom.", chatResponse);
    });
});

    // ✅ Unapređen prikaz grafikona (sada podržava različite tipove)
function renderChart(ctx, data) {
    return new Promise((resolve) => {
        const labels = data.map(item => item['Mesto']);
        const values = data.map(item => item['Prihodi']);

        if (myChart) {
            myChart.destroy();
        }

        const chart = new Chart(ctx, {
                type: 'bar',  // NOVI TIP GRAFIKONA SA MODERNIM PRIKAZOM
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Prihodi (RSD)',
                        data: values,
                        backgroundColor: ['#ff4c4c', '#ff884d', '#ffcc4d', '#4dff88', '#4db8ff', '#994dff'],
                        borderColor: ['#e63946', '#f77f00', '#e9c46a', '#2a9d8f', '#457b9d', '#6a4c93'],
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 2000 }, // Animacija pojavljivanja grafikona
                    plugins: {
                        legend: { position: 'top', labels: { color: '#222', font: { size: 14 } } },
                        title: { display: true, text: '📊 Prihodi po mestima za odabrani mesec', font: { size: 16, weight: 'bold' } },
                        tooltip: { enabled: true, backgroundColor: '#fff', bodyColor: '#333', titleColor: '#000', borderColor: '#ccc', borderWidth: 1 }
                    },
                    scales: {
                        x: { ticks: { color: '#444' }, grid: { color: '#eee' } },
                        y: { ticks: { color: '#444' }, grid: { color: '#eee' } }
                    }
                }
            });

        resolve(chart);
    });
}

    // ✅ Tooltip aktivacija
document.addEventListener("DOMContentLoaded", function () {
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl);
    });
});

});

function typeWriterEffect(element, text, speed = 400, callback = null) { // Usporen na 150ms
    let i = 0;
    element.innerHTML = ""; // Resetujemo sadržaj

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);

            // Ako naiđe na kraj rečenice (tačka, dvotačka), dodajemo malu pauzu
            if (text.charAt(i) === '.' || text.charAt(i) === ':' || text.charAt(i) === ';') {
                setTimeout(typing, speed * 3); // Pauza nakon rečenice
            } else {
                setTimeout(typing, speed);
            }

            i++;
        } else if (callback) {
            setTimeout(callback, 1000); // Pauza pre sledeće animacije
        }
    }
    typing();
}

function typeWriterListEffect(element, textArray, speed = 10, callback = null) {
    let i = 0;
    element.innerHTML = ""; // Resetujemo listu

    function typing() {
        if (i < textArray.length) {
            let newElement = document.createElement("li"); // Kreiramo novi list item
            newElement.classList.add("list-group-item"); // Dodajemo Bootstrap klasu
            newElement.textContent = textArray[i]; // Dodajemo tekst sa efektom kucanja
            element.appendChild(newElement); // Dodajemo element u listu
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            setTimeout(callback, 500); // Kašnjenje pre sledeće animacije
        }
    }
    typing();
}

document.addEventListener("DOMContentLoaded", function() {
    const modal = document.getElementById("predictionModal");
    const btn = document.getElementById("view-trends");
    const closeButton = document.querySelector(".btn-close");

    if (!btn || !modal || !closeButton) {
        console.error("❌ Neki od elemenata nije pronađen.");
        return;
    }

    btn.onclick = function() {
        $("#predictionModal").modal("show");

        fetch("http://127.0.0.1:5003/api/predikcija_domaceg_prometa")
        .then(response => response.json())
        .then(data => {
            let modalContentArray = [];
            let months = ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Avg", "Sep", "Okt", "Nov", "Dec"];

            if (data.predikcije_po_mestu) {
                for (const mesto in data.predikcije_po_mestu) {
                    let predikcije = data.predikcije_po_mestu[mesto];
                    let formattedPredictions = predikcije.map((p, i) => `${months[i % 12]}: ${p.toFixed(2)} RSD`).join(", ");
                    modalContentArray.push(`${mesto}: ${formattedPredictions}`);
                }
            } else {
                modalContentArray.push("Nema dostupnih podataka.");
            }

            // Efekat kucanja za predikcije
            let predictionList = document.getElementById("prediction-list");
            typeWriterListEffect(predictionList, modalContentArray, 4, function () {
                // Nakon završetka kucanja predikcija, pokrećemo AI analizu
                typeWriterEffect(document.getElementById("gpt4-explanation"), data.gpt4_objasnjenje, 25);
            });
        })
        .catch(error => {
            $("#modal-content-body").html("<p class='text-danger'>❌ Greška pri učitavanju podataka.</p>");
            console.error("Greška pri učitavanju API-ja:", error);
        });
    };

    closeButton.onclick = function() {
        $("#predictionModal").modal("hide");
    };

    $("#print-report").click(function() {
        window.print();
    });

    $("#save-pdf").click(function() {
        alert("💾 PDF sačuvan! (Ovde možeš dodati realno generisanje PDF-a)");
    });
});

</script>
