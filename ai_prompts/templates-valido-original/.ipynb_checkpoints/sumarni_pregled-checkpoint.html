<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValidoAI - Sumarni Pregled</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1c1c1e;
            color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }
        .navbar {
            background-color: #0d6efd;
        }
        .navbar-brand, .nav-link {
            color: #f8f9fa !important;
        }
        footer {
            background-color: #0d1117;
            color: #b3b3b3;
            padding: 10px;
            margin-top: 30px;
            border-radius: 8px;
        }
        .description {
            margin-top: 20px;
            padding: 20px;
            background-color: #2c2c2e;
            border-radius: 10px;
            text-align: center;
            color: #b3b3b3;
        }
        .upload-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #2c2c2e;
            border-radius: 10px;
            text-align: center;
        }
        .upload-box input {
            margin-bottom: 10px;
        }
        .result-container {
            margin-top: 30px;
        }
        .table-container, .chart-container {
            margin-top: 20px;
            background-color: #2c2c2e;
            padding: 20px;
            border-radius: 10px;
            display: none; /* Initially hidden */
        }
        canvas {
            width: 100% !important;
            height: 400px !important;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">ValidoAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Početna</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/funkcionalnosti">Funkcionalnosti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/predikcije">Kontakt</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Opis predikcija -->
    <div class="container mt-5">
        <div class="description">
            <h1>Finansijski Pregled</h1>
            <p>Pratite ključne finansijske metrike kroz pregled jasno vizualizovanih podataka. Osigurajte preciznost i uvid u svoje poslovanje.</p>
        </div>

        <!-- Upload Box -->
        <div class="upload-box mt-4">
            <h4>Unesite podatke za pregled:</h4>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="file-input" accept=".csv" class="form-control mb-3">
                <button type="button" id="upload-button" class="btn btn-primary">učitaj grafikon</button>
            </form>
        </div>

        <!-- Grafikon -->
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <footer class="text-center">
        <p>&copy; 2025 ValidoAI. Sva prava zadržana.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.getElementById("upload-button").addEventListener("click", function () {
            const fileInput = document.getElementById("file-input");
            if (fileInput.files.length === 0) {
                alert("Molimo vas da odaberete CSV fajl.");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            fetch("/api/predictions", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.querySelector(".chart-container").style.display = 'block';
                    const ctx = document.getElementById("chart").getContext("2d");
                    new Chart(ctx, {
                        type: "bar",
                        data: {
                            labels: ["Bruto", "Porez", "PIO", "ZDR", "NEZ"], // Primer kategorija
                            datasets: [{
                                label: "Sumarni podaci",
                                data: [200000, 15000, 45000, 30000, 5000], // Primer podataka
                                backgroundColor: ["blue", "green", "red", "purple", "orange"],
                                hoverBackgroundColor: ["#2f75ff", "#2ecc71", "#e74c3c", "#9b59b6", "#f39c12"],
                                borderWidth: 1,
                                hoverBorderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: function (context) {
                                            return `${context.label}: ${context.raw.toLocaleString()} dinara`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            },
                            interaction: {
                                mode: 'nearest',
                                axis: 'x',
                                intersect: true
                            }
                        }
                    });
                }
            })
            .catch(error => {
                alert("Došlo je do greške prilikom obrade vašeg zahteva.");
                console.error(error);
            });
        });
    </script>
</body>
</html>
