# Redis Configuration
bind 0.0.0.0
port 6379
requirepass redis123

# Persistence
appendonly yes
appendfsync everysec

# Memory management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Logging
loglevel notice
logfile ""

# Security
protected-mode no
