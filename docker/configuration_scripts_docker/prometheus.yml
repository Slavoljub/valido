global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker containers
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']

  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgresql_ai_valido:5432']
    metrics_path: /metrics

  # MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql_ai_valido:3306']
    metrics_path: /metrics

  # MongoDB
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb_ai_valido:27017']
    metrics_path: /metrics

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_ai_valido:6379']
    metrics_path: /metrics

  # Jenkins
  - job_name: 'jenkins'
    static_configs:
      - targets: ['jenkins_ai_valido:8080']
    metrics_path: /prometheus

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana_ai_valido:3000']
    metrics_path: /metrics

  # Node Exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Docker containers via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics

  # ValidoAI Application (if running)
  - job_name: 'validoai-app'
    static_configs:
      - targets: ['py_ai_valido_container:5000']
    metrics_path: /metrics
