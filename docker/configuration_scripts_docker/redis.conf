# Redis Configuration for ValidoAI with Advanced Features
# Supports JSON, Search, Time Series, Bloom Filters, Graph, and ML

# Basic Configuration
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Configuration
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Memory Management
maxmemory 4gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Security (No password for local development)
# requirepass valido123!

# Performance Tuning
tcp-backlog 511
tcp-nodelay yes
tcp-nopush yes
tcp-keepalive 300
tcp-keepalive-interval 75
tcp-keepalive-probes 9

# Client Configuration
timeout 0
tcp-keepalive 300
maxclients 10000

# Advanced Features Configuration

# RedisJSON Module Settings
# JSON.SET key path value [NX | XX]
# JSON.GET key [path]
# JSON.DEL key [path]
# JSON.MGET key [key ...] path
# JSON.TYPE key [path]
# JSON.NUMINCRBY key path number
# JSON.STRAPPEND key [path] json-string
# JSON.STRLEN key [path]
# JSON.ARRAPPEND key [path] value [value ...]
# JSON.ARRINDEX key path json-scalar [start [stop]]
# JSON.ARRINSERT key path index value [value ...]
# JSON.ARRLEN key [path]
# JSON.ARRPOP key [path [index]]
# JSON.ARRTRIM key path start stop
# JSON.OBJKEYS key [path]
# JSON.OBJLEN key [path]

# RedisSearch Module Settings
# FT.CREATE index [ON HASH | JSON] [PREFIX count prefix [prefix ...]] [FILTER filter] [LANGUAGE default_lang] [LANGUAGE_FIELD lang_attribute] [SCORE default_score] [SCORE_FIELD score_attribute] [PAYLOAD_FIELD payload_attribute] [MAXTEXTFIELDS] [TEMPORARY seconds] [NOOFFSETS] [NOHL] [NOFIELDS] [NOFREQS] [SKIPINITIALSCAN] [STOPWORDS count stopword [stopword ...]] SCHEMA field_name [AS alias] TEXT | NUMERIC | GEO | TAG [SORTABLE] [NOINDEX] [weight weight] [SEPARATOR sep] [CASESENSITIVE] [field_name [AS alias] TEXT | NUMERIC | GEO | TAG [SORTABLE] [NOINDEX] [weight weight] [SEPARATOR sep] [CASESENSITIVE] ...]

# RedisTimeSeries Module Settings
# TS.CREATE key [RETENTION retentionTime] [ENCODING COMPRESSED | UNCOMPRESSED] [CHUNK_SIZE size] [DUPLICATE_POLICY policy] [LABELS label value...]
# TS.ADD key timestamp value [RETENTION retentionTime] [ENCODING COMPRESSED | UNCOMPRESSED] [CHUNK_SIZE size] [ON_DUPLICATE policy] [LABELS label value...]
# TS.MADD key timestamp value [key timestamp value ...]
# TS.INCRBY key value [TIMESTAMP timestamp] [RETENTION retentionTime] [ENCODING COMPRESSED | UNCOMPRESSED] [CHUNK_SIZE size] [LABELS label value...]
# TS.DECRBY key value [TIMESTAMP timestamp] [RETENTION retentionTime] [ENCODING COMPRESSED | UNCOMPRESSED] [CHUNK_SIZE size] [LABELS label value...]
# TS.CREATERULE sourceKey destKey AGGREGATION aggregator bucketDuration [alignTimestamp]
# TS.DELETERULE sourceKey destKey
# TS.RANGE key fromTimestamp toTimestamp [COUNT count] [AGGREGATION aggregator bucketDuration [alignTimestamp]]
# TS.REVRANGE key fromTimestamp toTimestamp [COUNT count] [AGGREGATION aggregator bucketDuration [alignTimestamp]]
# TS.MRANGE fromTimestamp toTimestamp [COUNT count] [AGGREGATION aggregator bucketDuration [alignTimestamp]] [WITHLABELS] FILTER filter...
# TS.MREVRANGE fromTimestamp toTimestamp [COUNT count] [AGGREGATION aggregator bucketDuration [alignTimestamp]] [WITHLABELS] FILTER filter...
# TS.GET key
# TS.MGET [WITHLABELS] FILTER filter...
# TS.INFO key [DEBUG]
# TS.QUERYINDEX filter...

# RedisBloom Module Settings
# BF.RESERVE key error_rate size
# BF.ADD key item
# BF.MADD key item [item ...]
# BF.INSERT key [CAPACITY cap] [ERROR error] [EXPANSION expansion] [NOCREATE] [NONSCALING] ITEMS item [item ...]
# BF.EXISTS key item
# BF.MEXISTS key item [item ...]
# BF.SCANDUMP key iterator
# BF.LOADCHUNK key iterator data
# BF.INFO key
# BF.DEBUG key

# RedisGraph Module Settings
# GRAPH.QUERY graph query [timeout]
# GRAPH.RO_QUERY graph query [timeout]
# GRAPH.DELETE graph
# GRAPH.EXPLAIN graph query
# GRAPH.PROFILE graph query [timeout]
# GRAPH.SLOWLOG graph
# GRAPH.CONFIG GET option
# GRAPH.CONFIG SET option value

# RedisML Module Settings
# ML.MODEL_SET key backend model [BLOB blob] [INPUTS input [input ...]] [OUTPUTS output [output ...]]
# ML.MODEL_GET key
# ML.MODEL_DEL key
# ML.MODEL_RUN key input [input ...] [TIMEOUT timeout]
# ML.MODEL_PREDICT key input [input ...] [TIMEOUT timeout]
# ML.MODEL_RUN_SESSION session_key model_key input [input ...] [TIMEOUT timeout]
# ML.MODEL_RUN_SESSION_RUN session_key input [input ...] [TIMEOUT timeout]
# ML.MODEL_RUN_SESSION_DEL session_key
# ML.MODEL_RUN_SESSION_LIST
# ML.MODEL_RUN_SESSION_GET session_key

# Lua Scripting
lua-time-limit 5000

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitor
latency-monitor-threshold 100

# Event Notification
notify-keyspace-events ""

# Advanced Memory Management
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client Query Buffer Limit
client-query-buffer-limit 1gb

# Protocol Buffer Limit
proto-max-bulk-len 512mb

# Frequency Limit
hz 10

# Dynamic HZ
dynamic-hz yes

# AOF Rewrite Incremental FSync
aof-rewrite-incremental-fsync yes

# RDB Save Incremental FSync
rdb-save-incremental-fsync yes

# LFU Log Factor
lfu-log-factor 10

# LFU Decay Time
lfu-decay-time 1

# Active Rehashing
activerehashing yes

# Jemalloc Background Thread
jemalloc-bg-thread yes

# IO Threads
io-threads 4
io-threads-do-reads no

# Cluster Configuration (for future scaling)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 15000
# cluster-replica-validity-factor 10
# cluster-migration-barrier 1
# cluster-require-full-coverage yes
# cluster-replica-no-failover no
# cluster-allow-reads-when-down no

