[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_* test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=src
    --cov=app.py
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-report=lcov:coverage.lcov
    --cov-fail-under=90
    --durations=10
    --maxfail=5
    --capture=no
    --asyncio-mode=auto
    -p no:warnings
    --cache-clear
markers =
    # Test type markers
    unit: "Unit tests - fast, isolated tests"
    integration: "Integration tests - test component interactions"
    e2e: "End-to-end tests - full user journey"
    functional: "Functional tests - feature-specific tests"

    # Feature markers
    database: "Database-related tests"
    api: "API endpoint tests"
    ai: "AI/ML functionality tests"
    auth: "Authentication and authorization tests"
    security: "Security-related tests"
    ui: "User interface tests"
    websocket: "WebSocket functionality tests"
    performance: "Performance tests"
    slow: "Slow running tests (deselect with '-m \"not slow\"')"
    smoke: "Smoke tests for critical functionality"
    regression: "Regression tests"

    # Environment markers
    development: "Tests for development environment"
    production: "Tests for production environment"
    staging: "Tests for staging environment"

    # Database markers
    sqlite: "SQLite-specific tests"
    postgresql: "PostgreSQL-specific tests"
    mysql: "MySQL-specific tests"

filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestAssertRewriteWarning
    ignore::ResourceWarning
    ignore::DeprecationWarning:flask_sqlalchemy
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:werkzeug

# Coverage configuration
[coverage:run]
source = src, app.py, routes.py
omit =
    */tests/*
    */venv/*
    */node_modules/*
    */__pycache__/*
    */migrations/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Async test support is already configured in the main [tool:pytest] section above